<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruder 1 - Pricing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>

    <div id="particles-js"></div>
    <div id="scanlines"></div>

    <nav class="nav-container">
        <a href="index.html" class="brand-logo">
            <img src="img/logo.png" alt="Kruder 1">
        </a>
        <div class="nav-actions">
            <button id="btn-theme" class="nav-action-btn"><i class="fa-solid fa-moon"></i></button>
            <button id="btn-lang" class="nav-action-btn">EN</button>
            <button class="menu-btn" id="menu-toggle" aria-label="Menu">
                <div class="menu-icon"></div>
            </button>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
        <nav class="menu-links">
            <a href="index.html" class="menu-link" data-i18n="m_home"></a>
            <a href="pricing.html" class="menu-link is-active" data-i18n="m_pricing"></a>
            <a href="faqs.html" class="menu-link" data-i18n="m_faqs"></a>
            <a href="login.html" class="menu-link is-highlight" data-i18n="m_access" data-auth-guest></a>
            <a href="dashboard.html" class="menu-link auth-hidden" data-i18n="m_dash" data-auth-user></a>
            <a href="#" class="menu-link is-highlight auth-hidden" data-i18n="m_logout" data-auth-user id="link-logout"></a>
        </nav>
    </div>

    <main>
        <section class="section">
            <div class="hero-container">
                <h1 class="hero-title" data-i18n="pricing_title"></h1>
                <p class="hero-subtitle" data-i18n="pricing_subtitle"></p>
                <div class="pricing-features" data-i18n="pricing_features"></div>
            </div>

            <div class="pricing-grid">
                <div class="pricing-card">
                    <div class="card-title" data-i18n="p_basic_title"></div>
                    <div class="card-credits">150</div>
                    <div class="card-price">$40 USD</div>
                    <button type="button" class="btn-accent is-full btn-buy" data-i18n="btn_buy" data-price-id="price_1SwcrIC1FI34uKMLaGO8Fxsh"></button>
                </div>

                <div class="pricing-card">
                    <div class="card-badge" data-i18n="p_popular"></div>
                    <div class="card-title" data-i18n="p_plus_title"></div>
                    <div class="card-credits">300</div>
                    <div class="card-price">$60 USD</div>
                    <button type="button" class="btn-accent is-full btn-buy" data-i18n="btn_buy" data-price-id="price_1SwcqbC1FI34uKMLDWbAblgV"></button>
                </div>

                <div class="pricing-card">
                    <div class="card-title" data-i18n="p_pro_title"></div>
                    <div class="card-credits">600</div>
                    <div class="card-price">$90 USD</div>
                    <button type="button" class="btn-accent is-full btn-buy" data-i18n="btn_buy" data-price-id="price_1SwcqCC1FI34uKMLiUN0eOD6"></button>
                </div>
            </div>

            <div class="pricing-footer" data-auth-guest>
                <a href="login.html" class="btn-accent" data-i18n="btn_start" id="btn-get-started"></a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html" data-i18n="footer_privacy"></a>
            <span>·</span>
            <a href="terms.html" data-i18n="footer_terms"></a>
            <span>·</span>
            <a href="contact.html" data-i18n="footer_contact"></a>
        </div>
        <div class="footer-copyright">© 2026 Kruder 1. All rights reserved.</div>
    </footer>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            KRUDER.init({
                pricing_title: { en: 'Buy credits.<br>Use them when you need them.', es: 'Compra cr\u00e9ditos.<br>\u00dasalos cuando los necesites.' },
                pricing_subtitle: { en: '1 credit = 1 AI-generated image.', es: '1 cr\u00e9dito = 1 imagen generada con IA.' },
                pricing_features: { en: 'No subscriptions - No expiration - No hidden fees.<br>You only pay when you generate images. Credits never expire.', es: 'Sin suscripciones - Sin vencimiento - Sin cargos ocultos.<br>Solo pagas cuando generas im\u00e1genes. Los cr\u00e9ditos nunca expiran.' },
                p_basic_title: { en: 'Basic', es: 'Basic' },
                p_plus_title: { en: 'Plus', es: 'Plus' },
                p_popular: { en: 'Most Popular', es: 'M\u00e1s Popular' },
                p_pro_title: { en: 'Pro', es: 'Pro' },
                btn_buy: { en: 'Buy', es: 'Comprar' },
                btn_start: { en: 'Get started', es: 'Comenzar' }
            });

            /* --- Checkout --- */

            const startCheckout = async (priceId) => {
                const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                if (!token) { window.location.href = 'login.html'; return; }
                const btn = document.querySelector(`.btn-buy[data-price-id="${priceId}"]`);
                KRUDER.setBtnLoading(btn, true);
                try {
                    const res = await fetch(`${KRUDER.CONFIG.apiBase}/create-checkout-session`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ priceId, lang: KRUDER.STATE.lang })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Error');
                    if (data.url) window.location.href = data.url;
                    else throw new Error('No checkout URL');
                } catch (e) {
                    KRUDER.setBtnLoading(btn, false);
                    alert(e.message || 'Could not start checkout');
                }
            };

            document.querySelectorAll('.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => {
                    const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                    const priceId = btn.dataset.priceId;
                    if (!token) { window.location.href = 'login.html'; return; }
                    if (priceId) startCheckout(priceId);
                });
            });
        });
    </script>
</body>
</html>
