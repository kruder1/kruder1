<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruder 1 - Pricing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        :root {
            /* --- 1. Design Tokens --- */
            
            /* Layers (Z-Index System) */
            --z-negative: -1;
            --z-particles: 0;
            --z-content: 10;
            --z-overlay: 900;
            --z-menu: 1000;
            --z-header: 1200; /* Header on top */
            --z-button: 1300;
            --z-modal: 2000;
            --z-scanlines: 9999;

            /* Typography */
            --font-main: 'Inter Tight', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --ls-base: 0.01em;
            --ls-condensed: -0.02em;
            --ls-wide: 0.05em;
            
            --fs-hero: clamp(2rem, 6vw, 2.8rem);
            --fs-title: 2.8rem;
            --fs-subtitle: 1.5rem;
            --fs-nav: 1.5rem;
            --fs-btn: 1.2rem;
            --fs-input: 1rem;
            --fs-body: 1rem;
            --fs-small: 0.8rem;

            /* Spacing & Layout */
            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 4rem;
            
            --nav-height: 130px;
            --logo-width: 80px;
            --container-max: 900px;
            --auth-max: 400px;
            
            --border-width: 2px;
            --border-radius: 12px;

            /* Colors (Light Theme Default) */
            --color-bg: #ffffff;
            --color-text: #000000;
            --color-accent: #000000;
            --color-contrast: #ffffff;
            --color-border: #000000;
            --color-muted: rgba(0, 0, 0, 0.5);
            
            --bg-overlay-light: rgba(0, 0, 0, 0.05);
            --bg-overlay-focus: rgba(0, 0, 0, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.4);
            --shadow-strong: rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --color-bg: #000000;
            --color-text: #ffffff;
            --color-accent: #ffffff;
            --color-contrast: #000000;
            --color-border: #ffffff;
            --color-muted: rgba(255, 255, 255, 0.5);
            
            --bg-overlay-light: rgba(255, 255, 255, 0.05);
            --bg-overlay-focus: rgba(255, 255, 255, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.8);
            --shadow-strong: rgba(0, 0, 0, 0.5);
            
            color-scheme: dark;
        }

        /* --- 2. Global Reset & Base --- */
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        *::-webkit-scrollbar { display: none; }
        
        html, body { height: 100%; width: 100%; }

        body {
            display: flex;
            flex-direction: column;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            font-size: var(--fs-body);
            line-height: 1.5;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        a { text-decoration: none !important; color: inherit; cursor: pointer; }
        button { border: none; background: transparent; cursor: pointer; color: inherit; font-family: inherit; }
        
        [data-theme="dark"] .brand-logo img { filter: invert(1); }

        /* --- 3. Global Effects --- */
        
        #scanlines {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, var(--bg-overlay-light), var(--bg-overlay-light) 1px, transparent 1px, transparent 3px);
            pointer-events: none; z-index: var(--z-scanlines);
        }

        #particles-js {
            position: fixed; inset: 0;
            z-index: var(--z-particles);
            pointer-events: none;
        }

        /* --- 4. Navigation (Header) --- */
        
        .nav-container {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 var(--space-lg);
            background: var(--color-bg);
            border-bottom: 1px solid var(--bg-overlay-light);
            z-index: var(--z-header);
        }

        .brand-logo img { display: block; width: var(--logo-width); height: auto; padding: var(--space-md) 0; }

        .nav-actions { display: flex; align-items: center; gap: var(--space-md); }
        
        .nav-action-btn { 
            font-family: var(--font-mono); font-weight: 700; font-size: 1.1rem; 
            text-transform: uppercase; padding: 0; transition: opacity 0.2s;
        }
        .nav-action-btn:hover { opacity: 0.6; }

        /* --- 5. Navigation (Drawer) --- */
        
        .menu-btn {
            position: relative; z-index: var(--z-button);
            width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
        }
        
        .menu-icon {
            position: relative; width: 30px; height: 2px;
            background: var(--color-text); transition: all 0.3s ease;
        }
        .menu-icon::before, .menu-icon::after {
            content: ''; position: absolute; left: 0;
            width: 30px; height: 2px; background: var(--color-text);
            transition: all 0.3s ease;
        }
        .menu-icon::before { top: -8px; }
        .menu-icon::after { top: 8px; }

        .menu-btn.is-active .menu-icon { background: transparent; }
        .menu-btn.is-active .menu-icon::before { top: 0; transform: rotate(45deg); }
        .menu-btn.is-active .menu-icon::after { top: 0; transform: rotate(-45deg); }

        .side-menu {
            position: fixed; 
            top: var(--nav-height);
            right: -100%;
            width: auto;
            min-width: 250px;
            height: calc(100vh - var(--nav-height));
            background: var(--color-bg);
            border-left: 1px solid var(--bg-overlay-light);
            border-top: 1px solid var(--bg-overlay-light);
            padding: var(--space-lg) var(--space-xl);
            display: flex; flex-direction: column;
            z-index: var(--z-menu);
            
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: -10px 10px 30px var(--shadow-strong);
        }
        .side-menu.is-open { right: 0; }

        .menu-links { display: flex; flex-direction: column; gap: var(--space-md); flex: 1; }

        .menu-link {
            font-family: var(--font-main); font-size: var(--fs-nav); font-weight: 900;
            text-transform: uppercase; letter-spacing: var(--ls-condensed);
            color: var(--color-text); opacity: 1;
            text-decoration: none;
        }
        .menu-link:hover, .menu-link.is-active { opacity: 1; }
        .menu-link.is-highlight { opacity: 1; color: var(--color-text); /* No underline */ } 

        .menu-overlay {
            position: fixed; inset: 0;
            background: var(--bg-overlay-medium);
            z-index: var(--z-overlay);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu-overlay.is-active { opacity: 1; pointer-events: all; }

        .auth-hidden { display: none !important; }

        /* --- 6. Main Layout --- */

        main {
            flex: 1; width: 100%; padding-top: var(--nav-height);
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: var(--z-content);
        }

        .section {
            flex: 1; width: 100%; max-width: var(--container-max);
            display: flex; flex-direction: column; justify-content: center;
            padding: var(--space-lg) var(--space-md); margin: 0 auto;
        }
        .section:has(.pricing-grid) {
            max-width: 1000px;
        }

        /* --- 7. UI Components: Buttons --- */

        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 200px; padding: var(--space-sm) var(--space-lg);
            font-family: var(--font-mono); font-size: var(--fs-btn); font-weight: 700;
            letter-spacing: var(--ls-base); text-transform: uppercase;
            background: var(--color-text); color: var(--color-contrast);
            border: var(--border-width) solid var(--color-text); 
            border-radius: var(--border-radius);
            transition: all 0.2s ease;
        }
        .btn-primary:hover { background: var(--color-bg); color: var(--color-text); }
        .btn-primary.is-disabled { opacity: 0.5; pointer-events: none; }
        .btn-primary.is-loading { opacity: 0.8; pointer-events: none; }
        .btn-primary.is-full { display: flex; width: 100%; margin-top: var(--space-md); }
        .btn-primary.is-sharp { border-radius: 0; }

        .btn-link {
            background: transparent; text-align: center; font-size: 1.1rem;
            color: var(--color-text); padding: var(--space-xs) 0;
            opacity: 0.7; text-decoration: underline !important; 
        }
        .btn-link:hover { opacity: 1; }

        /* --- 8. UI Components: Forms - [UNUSED IN PRICING] --- */
        /* --- 9. UI Components: Modals - [UNUSED IN PRICING] --- */

        /* --- 10. View: Hero (Home) --- */

        .hero-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; text-align: center;
        }

        .hero-title { 
            font-weight: 900; font-size: var(--fs-hero); line-height: 1.1; 
            letter-spacing: var(--ls-condensed); text-transform: uppercase; 
            margin-bottom: var(--space-sm);
        }
        
        .hero-subtitle { 
            font-size: var(--fs-subtitle); font-weight: 500;
            opacity: 0.8; margin-bottom: var(--space-sm); 
        }

        /* --- 11. View: Auth (Login) - [UNUSED IN PRICING] --- */

        /* --- 12. View: Pricing --- */

        .pricing-grid {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 24px;
            width: 100%;
            margin-top: var(--space-lg);
            justify-content: center;
        }

        .pricing-card {
            width: 300px;
            height: 300px;
            flex: 0 0 300px;
            border: var(--border-width) solid var(--color-border);
            border-radius: var(--border-radius);
            padding: var(--space-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            transition: transform 0.3s ease;
        }

        .pricing-card:has(.card-badge) {
            padding-top: 1.5rem;
        }

        .card-badge {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 8px 16px;
            border-radius: var(--border-radius);
            background: var(--color-text);
            color: var(--color-contrast);
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: var(--ls-wide);
            white-space: nowrap;
        }

        .card-title {
            font-family: var(--font-main);
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: var(--ls-base);
            text-transform: uppercase;
            margin: 0;
            color: var(--color-text);
        }

        .card-credits {
            font-family: var(--font-main);
            font-weight: 900;
            font-size: 3.5rem;
            line-height: 1;
            margin: 0;
            color: var(--color-text);
        }

        .card-price {
            font-family: var(--font-main);
            font-weight: 900;
            font-size: 1.5rem;
            margin: 0;
            color: var(--color-text);
        }

        .card-rate {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--color-muted);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: var(--ls-base);
        }
        
        .pricing-features {
            width: 100%; text-align: center; font-size: 1.1rem; line-height: 1.6;
            opacity: 0.8; margin-top: 0;
        }

        .pricing-footer { width: 100%; text-align: center; margin-top: var(--space-lg); }

        /* --- 13. Footer --- */
        
        .site-footer {
            position: relative; z-index: var(--z-content);
            padding: var(--space-lg) 0; text-align: center; font-size: var(--fs-small);
        }
        .footer-links a { 
            font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; 
            margin: 0 var(--space-sm); transition: opacity 0.2s;
        }
        .footer-links a:hover { opacity: 0.7; }
        .footer-copyright { opacity: 0.5; margin-top: var(--space-sm); }

        /* --- 14. Responsive --- */
        
        @media (max-width: 960px) {
            .hero-title, .auth-title { font-size: 2.2rem; }
            .hero-subtitle { font-size: 1.1rem; }
            .section { padding-left: var(--space-md); padding-right: var(--space-md); }
            .pricing-grid { flex-wrap: wrap; flex-direction: column; align-items: center; gap: var(--space-lg); }
            .pricing-card { flex: 0 0 auto; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div id="scanlines"></div>

    <nav class="nav-container">
        <a href="index.html" class="brand-logo">
            <img src="img/logo.png" alt="Kruder 1">
        </a>
        <div class="nav-actions">
            <button id="btn-theme" class="nav-action-btn"><i class="fa-solid fa-moon"></i></button>
            <button id="btn-lang" class="nav-action-btn">EN</button>
            <button class="menu-btn" id="menu-toggle" aria-label="Menu">
                <div class="menu-icon"></div>
            </button>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
        <nav class="menu-links">
            <a href="index.html" class="menu-link" data-i18n="m_home"></a>
            <a href="pricing.html" class="menu-link is-active" data-i18n="m_pricing"></a>

        </nav>

    <main>
        <section class="section">
            <div class="hero-container">
                <h1 class="hero-title" data-i18n="pricing_title"></h1>

                    <div class="card-badge" data-i18n="p_popular"></div>

                    <div class="card-credits">300</div>
                    <div class="card-price">$60 USD</div>
                    <div class="card-rate" data-i18n="p_plus_rate"></div>
                    <button type="button" class="btn-primary is-full btn-buy" data-i18n="btn_buy" data-price-id="price_1SwcqbC1FI34uKMLDWbAblgV"></button>
                </div>

                <div class="pricing-card">
                    <div class="card-title" data-i18n="p_pro_title"></div>
                    <div class="card-credits">600</div>
                    <div class="card-price">$100 USD</div>
                    <div class="card-rate" data-i18n="p_pro_rate"></div>
                    <button type="button" class="btn-primary is-full btn-buy" data-i18n="btn_buy" data-price-id="price_1SwcqCC1FI34uKMLiUN0eOD6"></button>

                <a href="login.html" class="btn-primary" data-i18n="btn_start" id="btn-get-started"></a>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html" data-i18n="footer_privacy"></a>
            <span>·</span>
            <a href="terms.html" data-i18n="footer_terms"></a>
            <span>·</span>
            <a href="contact.html" data-i18n="footer_contact"></a>
        </div>
        <div class="footer-copyright">© 2026 Kruder 1. All rights reserved.</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            /* --- 1. Global Configuration & State --- */

            const CONFIG = {
                keyLang: 'KRUDER1-concept-lang',
                keyTheme: 'KRUDER1-concept-theme',
                keyToken: 'KRUDER1_token',
                apiBase: 'https://kruder1-auth.kruder1-master.workers.dev',
                particlesColor: { light: '#000000', dark: '#ffffff' }
            };

            const detectSystemLang = () => {
                const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
                return lang.startsWith('es') ? 'es' : 'en';
            };

            const STATE = {
                lang: localStorage.getItem(CONFIG.keyLang) || detectSystemLang(),
                theme: localStorage.getItem(CONFIG.keyTheme) || 'light'
            };

            const DOM = {
                root: document.documentElement,
                btnLang: document.getElementById('btn-lang'),
                btnTheme: document.getElementById('btn-theme'),
                btnMenu: document.getElementById('menu-toggle'),
                menuDrawer: document.getElementById('side-menu'),
                menuOverlay: document.getElementById('menu-overlay'),
                i18nElements: document.querySelectorAll('[data-i18n]')
            };

            /* --- 2. Localization Dictionary (I18N) --- */
            
            const DICTIONARY = {
                // --- Navigation ---
                m_home: { en: 'Home', es: 'Inicio' },
                m_pricing: { en: 'Pricing', es: 'Precios' },
                m_faqs: { en: 'FAQ\'s', es: 'Preguntas' },
                m_access: { en: 'Login / Join', es: 'Entrar / Unirse' },
                m_dash: { en: 'Dashboard', es: 'Panel' },
                m_logout: { en: 'Logout', es: 'Salir' },

                // --- View: Pricing ---
                pricing_title: { en: 'Buy credits.<br>Use them when you need them.', es: 'Compra créditos.<br>Úsalos cuando los necesites.' },
                pricing_subtitle: { en: '1 credit = 1 AI-generated image.', es: '1 crédito = 1 imagen generada con IA.' },
                pricing_features: { 
                    en: 'No subscriptions - No expiration - No hidden fees.<br>You only pay when you generate images. Credits never expire.',
                    es: 'Sin suscripciones - Sin vencimiento - Sin cargos ocultos.<br>Solo pagas cuando generas imágenes. Los créditos nunca expiran.'
                },
                p_basic_title: { en: 'Basic', es: 'Basic' },
                p_basic_rate: { en: '0.27 USD / Credit', es: '0.27 USD / Crédito' },
                p_plus_title: { en: 'Plus', es: 'Plus' },
                p_plus_rate: { en: '0.22 USD / Credit', es: '0.22 USD / Crédito' },
                p_popular: { en: 'Most Popular', es: 'Más Popular' },
                p_pro_title: { en: 'Pro', es: 'Pro' },
                p_pro_rate: { en: '0.17 USD / Credit', es: '0.17 USD / Crédito' },
                btn_buy: { en: 'Buy', es: 'Comprar' },
                btn_start: { en: 'Get started', es: 'Comenzar' },

                // --- Footer ---
                footer_privacy: { en: 'Privacy', es: 'Privacidad' },
                footer_terms: { en: 'Terms', es: 'Términos' },
                footer_contact: { en: 'Contact', es: 'Contacto' }
            };

            /* --- 3. Core Functions --- */

            const t = (key) => {
                const entry = DICTIONARY[key];
                return entry ? (entry[STATE.lang] || entry.en) : key;
            };

            const updateTexts = () => {
                DOM.i18nElements.forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (key) el.innerHTML = t(key);
                });
            };

            const setLang = (newLang) => {
                STATE.lang = newLang;
                localStorage.setItem(CONFIG.keyLang, newLang);
                DOM.root.lang = newLang;
                if (DOM.btnLang) DOM.btnLang.textContent = newLang.toUpperCase();
                updateTexts();
            };

            const setTheme = (newTheme) => {
                STATE.theme = newTheme;
                localStorage.setItem(CONFIG.keyTheme, newTheme);
                if (newTheme === 'dark') {
                    DOM.root.setAttribute('data-theme', 'dark');
                    if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>';
                } else {
                    DOM.root.removeAttribute('data-theme');
                    if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-moon"></i>';
                }
                initParticles();
            };

            const toggleMenu = () => {
                DOM.btnMenu.classList.toggle('is-active');
                DOM.menuDrawer.classList.toggle('is-open');
                DOM.menuOverlay.classList.toggle('is-active');
            };

            const updateAuthUI = () => {
                const token = localStorage.getItem(CONFIG.keyToken);
                const isLoggedIn = !!token;
                document.querySelectorAll('[data-auth-guest]').forEach(el => el.classList.toggle('auth-hidden', isLoggedIn));
                document.querySelectorAll('[data-auth-user]').forEach(el => el.classList.toggle('auth-hidden', !isLoggedIn));
            };

            const setBtnLoading = (btn, loading) => {
                if (!btn) return;
                btn.disabled = loading;
                btn.classList.toggle('is-loading', loading);
                btn.dataset.originalText = btn.dataset.originalText || btn.innerHTML;
                if (loading) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                else btn.innerHTML = btn.dataset.originalText || t('btn_buy');
            };

            const startCheckout = async (priceId) => {
                const token = localStorage.getItem(CONFIG.keyToken);
                if (!token) { window.location.href = 'login.html'; return; }
                const btn = document.querySelector(`.btn-buy[data-price-id="${priceId}"]`);
                setBtnLoading(btn, true);
                try {
                    const res = await fetch(`${CONFIG.apiBase}/create-checkout-session`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ priceId, lang: STATE.lang })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Error');
                    if (data.url) window.location.href = data.url;
                    else throw new Error('No checkout URL');
                } catch (e) {
                    setBtnLoading(btn, false);
                    alert(e.message || 'Could not start checkout');
                }
            };

            const logout = () => {
                localStorage.removeItem(CONFIG.keyToken);
                window.location.href = 'login.html';
            };

            /* --- 4. Particles System --- */

            const initParticles = () => {
                if (!window.particlesJS) return;
                const color = STATE.theme === 'dark' ? CONFIG.particlesColor.dark : CONFIG.particlesColor.light;
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 200, density: { enable: true, value_area: 800 } },
                        color: { value: color },
                        shape: { type: 'circle' },
                        opacity: { value: 0.1, random: true },
                        size: { value: 2, random: true },
                        line_linked: { 
                            enable: true, 
                            distance: 150, 
                            color: color, 
                            opacity: 0.1, 
                            width: 1 
                        },
                        move: { enable: true, speed: 2, direction: 'none', out_mode: 'out' }
                    },
                    interactivity: { detect_on: 'canvas', events: { onhover: { enable: false }, onclick: { enable: false } } },
                    retina_detect: true
                });
            };

            /* --- 5. Initialization & Events --- */

            if (DOM.btnLang) DOM.btnLang.addEventListener('click', () => setLang(STATE.lang === 'en' ? 'es' : 'en'));
            if (DOM.btnTheme) DOM.btnTheme.addEventListener('click', () => setTheme(STATE.theme === 'light' ? 'dark' : 'light'));
            if (DOM.btnMenu) DOM.btnMenu.addEventListener('click', toggleMenu);
            if (DOM.menuOverlay) DOM.menuOverlay.addEventListener('click', toggleMenu);
            document.getElementById('link-logout')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });

            document.querySelectorAll('.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => {
                    const token = localStorage.getItem(CONFIG.keyToken);
                    const priceId = btn.dataset.priceId;
                    if (!token) { window.location.href = 'login.html'; return; }
                    if (priceId) startCheckout(priceId);
                });
            });

            setLang(STATE.lang);
            setTheme(STATE.theme);
            updateAuthUI();
        });
    </script>
</body>
</html>
