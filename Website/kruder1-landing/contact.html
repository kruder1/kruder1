<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruder 1 - Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        :root {
            /* --- 1. Design Tokens --- */
            --z-negative: -1;
            --z-particles: 0;
            --z-content: 10;
            --z-overlay: 900;
            --z-menu: 1000;
            --z-header: 1200;
            --z-button: 1300;
            --z-modal: 2000;
            --z-scanlines: 9999;

            --font-main: 'Inter Tight', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --ls-base: 0.01em;
            --ls-condensed: -0.02em;
            --ls-wide: 0.05em;
            
            --fs-hero: clamp(2rem, 6vw, 2.8rem);
            --fs-title: 2.8rem;
            --fs-subtitle: 1.5rem;
            --fs-nav: 1.5rem;
            --fs-btn: 1.2rem;
            --fs-input: 1rem;
            --fs-body: 1rem;
            --fs-small: 0.8rem;

            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 4rem;
            
            --nav-height: 130px;
            --logo-width: 80px;
            --container-max: 900px;
            --auth-max: 400px;
            
            --border-width: 2px;
            --border-radius: 12px;

            --color-bg: #ffffff;
            --color-text: #000000;
            --color-accent: #000000;
            --color-contrast: #ffffff;
            --color-border: #000000;
            --color-muted: rgba(0, 0, 0, 0.5);
            
            --bg-overlay-light: rgba(0, 0, 0, 0.05);
            --bg-overlay-focus: rgba(0, 0, 0, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.4);
            --shadow-strong: rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --color-bg: #000000;
            --color-text: #ffffff;
            --color-accent: #ffffff;
            --color-contrast: #000000;
            --color-border: #ffffff;
            --color-muted: rgba(255, 255, 255, 0.5);
            --bg-overlay-light: rgba(255, 255, 255, 0.05);
            --bg-overlay-focus: rgba(255, 255, 255, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.8);
            --shadow-strong: rgba(0, 0, 0, 0.5);
            color-scheme: dark;
        }

        /* --- 2. Global Reset & Base --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        *::-webkit-scrollbar { display: none; }
        html, body { height: 100%; width: 100%; }

        body {
            display: flex; flex-direction: column;
            background-color: var(--color-bg); color: var(--color-text);
            font-family: var(--font-main); font-size: var(--fs-body);
            line-height: 1.5; overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        a { text-decoration: none !important; color: inherit; cursor: pointer; }
        button { border: none; background: transparent; cursor: pointer; color: inherit; font-family: inherit; }
        
        [data-theme="dark"] .brand-logo img { filter: invert(1); }

        /* --- 3. Global Effects --- */
        #scanlines {
            position: fixed; inset: 0; pointer-events: none; z-index: var(--z-scanlines);
            background: repeating-linear-gradient(0deg, var(--bg-overlay-light), var(--bg-overlay-light) 1px, transparent 1px, transparent 3px);
        }

        #particles-js { position: fixed; inset: 0; z-index: var(--z-particles); pointer-events: none; }

        /* --- 4. Navigation --- */
        .nav-container {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 var(--space-lg); background: var(--color-bg);
            border-bottom: 1px solid var(--bg-overlay-light); z-index: var(--z-header);
        }

        .brand-logo img { display: block; width: var(--logo-width); height: auto; padding: var(--space-md) 0; }

        .nav-actions { display: flex; align-items: center; gap: var(--space-md); }
        .nav-action-btn { font-family: var(--font-mono); font-weight: 700; font-size: 1.1rem; text-transform: uppercase; transition: opacity 0.2s; }
        .nav-action-btn:hover { opacity: 0.6; }

        .menu-btn { position: relative; z-index: var(--z-button); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .menu-icon { position: relative; width: 30px; height: 2px; background: var(--color-text); transition: all 0.3s ease; }
        .menu-icon::before, .menu-icon::after { content: ''; position: absolute; left: 0; width: 30px; height: 2px; background: var(--color-text); transition: all 0.3s ease; }
        .menu-icon::before { top: -8px; } .menu-icon::after { top: 8px; }

        .menu-btn.is-active .menu-icon { background: transparent; }
        .menu-btn.is-active .menu-icon::before { top: 0; transform: rotate(45deg); }
        .menu-btn.is-active .menu-icon::after { top: 0; transform: rotate(-45deg); }

        .side-menu {
            position: fixed; top: var(--nav-height); right: -100%;
            width: auto; min-width: 250px; height: calc(100vh - var(--nav-height));
            background: var(--color-bg); border-left: 1px solid var(--bg-overlay-light);
            border-top: 1px solid var(--bg-overlay-light); padding: var(--space-lg) var(--space-xl);
            display: flex; flex-direction: column; z-index: var(--z-menu);
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1); box-shadow: -10px 10px 30px var(--shadow-strong);
        }
        .side-menu.is-open { right: 0; }

        .menu-links { display: flex; flex-direction: column; gap: var(--space-md); flex: 1; }
        .menu-link { font-family: var(--font-main); font-size: var(--fs-nav); font-weight: 900; text-transform: uppercase; letter-spacing: var(--ls-condensed); color: var(--color-text); }
        
        .menu-overlay { position: fixed; inset: 0; background: var(--bg-overlay-medium); z-index: var(--z-overlay); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .menu-overlay.is-active { opacity: 1; pointer-events: all; }

        .auth-hidden { display: none !important; }

        /* --- 5. Main Layout --- */
        main { flex: 1; width: 100%; padding-top: var(--nav-height); display: flex; flex-direction: column; align-items: center; position: relative; z-index: var(--z-content); }
        .section { flex: 1; width: 100%; max-width: var(--container-max); display: flex; flex-direction: column; justify-content: center; padding: var(--space-lg) var(--space-md); margin: 0 auto; text-align: center; }

        /* --- 6. View: Contact --- */
        .contact-title { font-weight: 900; font-size: var(--fs-title); line-height: 1.1; letter-spacing: var(--ls-condensed); text-transform: uppercase; margin-bottom: var(--space-sm); }
        .contact-location { font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; margin-bottom: var(--space-lg); opacity: 0.6; letter-spacing: var(--ls-base); }
        .contact-text { font-size: 1.2rem; opacity: 0.8; margin-bottom: var(--space-md); }
        .contact-email { display: inline-block; font-weight: 900; font-size: 1.8rem; text-decoration: underline !important; margin-top: var(--space-sm); transition: opacity 0.2s; }
        .contact-email:hover { opacity: 0.7; }

        /* --- 7. Footer --- */
        .site-footer { position: relative; z-index: var(--z-content); padding: var(--space-lg) 0; text-align: center; font-size: var(--fs-small); }
        .footer-links a { font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; margin: 0 var(--space-sm); transition: opacity 0.2s; }
        .footer-copyright { opacity: 0.5; margin-top: var(--space-sm); }

        @media (max-width: 900px) {
            .contact-title { font-size: 2.2rem; }
            .section { padding-left: var(--space-md); padding-right: var(--space-md); }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div id="scanlines"></div>

    <nav class="nav-container">
        <a href="index.html" class="brand-logo"><img src="img/logo.png" alt="Kruder 1"></a>
        <div class="nav-actions">
            <button id="btn-theme" class="nav-action-btn"><i class="fa-solid fa-moon"></i></button>
            <button id="btn-lang" class="nav-action-btn">EN</button>
            <button class="menu-btn" id="menu-toggle"><div class="menu-icon"></div></button>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
        <nav class="menu-links">
            <a href="index.html" class="menu-link" data-i18n="m_home"></a>
            <a href="pricing.html" class="menu-link" data-i18n="m_pricing"></a>
            <a href="faqs.html" class="menu-link" data-i18n="m_faqs"></a>
            <a href="login.html" class="menu-link is-highlight" data-i18n="m_access" data-auth-guest></a>
            <a href="dashboard.html" class="menu-link auth-hidden" data-i18n="m_dash" data-auth-user></a>
            <a href="#" class="menu-link is-highlight auth-hidden" data-i18n="m_logout" data-auth-user id="link-logout"></a>
        </nav>
    </div>

    <main>
        <section class="section">
            <h1 class="contact-title" data-i18n="c_title"></h1>
            <p class="contact-location" data-i18n="c_location"></p>
            <p class="contact-text" data-i18n="c_text"></p>
            <a href="mailto:hola@kruder1.com" class="contact-email">hola@kruder1.com</a>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html" data-i18n="footer_privacy"></a><span>·</span>
            <a href="terms.html" data-i18n="footer_terms"></a><span>·</span>
            <a href="contact.html" data-i18n="footer_contact"></a>
        </div>
        <div class="footer-copyright">© 2026 Kruder 1. All rights reserved.</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const CONFIG = { keyLang: 'KRUDER1-concept-lang', keyTheme: 'KRUDER1-concept-theme', keyToken: 'KRUDER1_token', particlesColor: { light: '#000000', dark: '#ffffff' } };
            const detectSystemLang = () => { const l = (navigator.language || navigator.userLanguage || 'en').toLowerCase(); return l.startsWith('es') ? 'es' : 'en'; };
            const STATE = { lang: localStorage.getItem(CONFIG.keyLang) || detectSystemLang(), theme: localStorage.getItem(CONFIG.keyTheme) || 'light' };
            const DOM = { root: document.documentElement, btnLang: document.getElementById('btn-lang'), btnTheme: document.getElementById('btn-theme'), btnMenu: document.getElementById('menu-toggle'), menuDrawer: document.getElementById('side-menu'), menuOverlay: document.getElementById('menu-overlay'), i18nElements: document.querySelectorAll('[data-i18n]') };

            const DICTIONARY = {
                // --- Navigation ---
                m_home: { en: 'Home', es: 'Inicio' },
                m_pricing: { en: 'Pricing', es: 'Precios' },
                m_faqs: { en: 'FAQ\'s', es: 'Preguntas' },
                m_access: { en: 'Login / Join', es: 'Entrar / Unirse' },
                m_dash: { en: 'Dashboard', es: 'Panel' },
                m_logout: { en: 'Logout', es: 'Salir' },
                // --- View: Contact ---
                c_title: { en: 'Contact', es: 'Contacto' },
                c_location: { en: 'We are based in Mexico.', es: 'Estamos en México.' },
                c_text: { en: 'For account questions, credits, or technical support, contact us at:', es: 'Para dudas sobre cuentas, créditos o soporte técnico, escríbenos a:' },
                // --- Footer ---
                footer_privacy: { en: 'Privacy', es: 'Privacidad' },
                footer_terms: { en: 'Terms', es: 'Términos' },
                footer_contact: { en: 'Contact', es: 'Contacto' }
            };

            const t = (k) => DICTIONARY[k] ? (DICTIONARY[k][STATE.lang] || DICTIONARY[k].en) : k;
            const updateTexts = () => DOM.i18nElements.forEach(el => { const k = el.getAttribute('data-i18n'); if (k) el.innerHTML = t(k); });
            const setLang = (l) => { STATE.lang = l; localStorage.setItem(CONFIG.keyLang, l); DOM.root.lang = l; if (DOM.btnLang) DOM.btnLang.textContent = l.toUpperCase(); updateTexts(); };
            const setTheme = (th) => { STATE.theme = th; localStorage.setItem(CONFIG.keyTheme, th); if (th === 'dark') { DOM.root.setAttribute('data-theme', 'dark'); if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>'; } else { DOM.root.removeAttribute('data-theme'); if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-moon"></i>'; } initParticles(); };
            const toggleMenu = () => { DOM.btnMenu.classList.toggle('is-active'); DOM.menuDrawer.classList.toggle('is-open'); DOM.menuOverlay.classList.toggle('is-active'); };
            const updateAuthUI = () => {
                const token = localStorage.getItem(CONFIG.keyToken);
                const isLoggedIn = !!token;
                document.querySelectorAll('[data-auth-guest]').forEach(el => el.classList.toggle('auth-hidden', isLoggedIn));
                document.querySelectorAll('[data-auth-user]').forEach(el => el.classList.toggle('auth-hidden', !isLoggedIn));
            };
            const logout = () => { localStorage.removeItem(CONFIG.keyToken); window.location.href = 'login.html'; };

            const initParticles = () => {
                if (!window.particlesJS) return;
                const c = STATE.theme === 'dark' ? CONFIG.particlesColor.dark : CONFIG.particlesColor.light;
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 200, density: { enable: true, value_area: 800 } },
                        color: { value: c }, shape: { type: 'circle' }, opacity: { value: 0.1, random: true }, size: { value: 2, random: true },
                        line_linked: { enable: true, distance: 150, color: c, opacity: 0.1, width: 1 },
                        move: { enable: true, speed: 2, direction: 'none', out_mode: 'out' }
                    },
                    interactivity: { detect_on: 'canvas', events: { onhover: { enable: false }, onclick: { enable: false } } },
                    retina_detect: true
                });
            };

            DOM.btnLang.addEventListener('click', () => setLang(STATE.lang === 'en' ? 'es' : 'en'));
            DOM.btnTheme.addEventListener('click', () => setTheme(STATE.theme === 'light' ? 'dark' : 'light'));
            DOM.btnMenu.addEventListener('click', toggleMenu);
            DOM.menuOverlay.addEventListener('click', toggleMenu);
            document.getElementById('link-logout')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });

            setLang(STATE.lang); setTheme(STATE.theme);
            updateAuthUI();
        });
    </script>
</body>
</html>
