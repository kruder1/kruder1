<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruder 1 - Email Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        :root {
            /* --- 1. Design Tokens --- */
            
            --z-negative: -1;
            --z-particles: 0;
            --z-content: 10;
            --z-overlay: 900;
            --z-menu: 1000;
            --z-header: 1200;
            --z-button: 1300;
            --z-modal: 2000;
            --z-scanlines: 9999;

            --font-main: 'Inter Tight', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --ls-base: 0.01em;
            --ls-condensed: -0.02em;
            --ls-wide: 0.05em;
            
            --fs-hero: clamp(2rem, 6vw, 2.8rem);
            --fs-title: 2.8rem;
            --fs-subtitle: 1.5rem;
            --fs-nav: 1.5rem;
            --fs-btn: 1.2rem;
            --fs-input: 1rem;
            --fs-body: 1rem;
            --fs-small: 0.8rem;

            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 4rem;
            
            --nav-height: 130px;
            --logo-width: 80px;
            --container-max: 900px;
            
            --border-width: 2px;
            --border-radius: 12px;

            --color-bg: #ffffff;
            --color-text: #000000;
            --color-accent: #000000;
            --color-contrast: #ffffff;
            --color-border: #000000;
            --color-muted: rgba(0, 0, 0, 0.5);
            
            --bg-overlay-light: rgba(0, 0, 0, 0.05);
            --bg-overlay-focus: rgba(0, 0, 0, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.4);
            --shadow-strong: rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --color-bg: #000000;
            --color-text: #ffffff;
            --color-accent: #ffffff;
            --color-contrast: #000000;
            --color-border: #ffffff;
            --color-muted: rgba(255, 255, 255, 0.5);
            --bg-overlay-light: rgba(255, 255, 255, 0.05);
            --bg-overlay-focus: rgba(255, 255, 255, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.8);
            --shadow-strong: rgba(0, 0, 0, 0.5);
            color-scheme: dark;
        }

        /* --- 2. Global Reset & Base --- */
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        *::-webkit-scrollbar { display: none; }
        
        html, body { height: 100%; width: 100%; }

        body {
            display: flex;
            flex-direction: column;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            font-size: var(--fs-body);
            line-height: 1.5;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        a { text-decoration: none !important; color: inherit; cursor: pointer; }
        button { border: none; background: transparent; cursor: pointer; color: inherit; font-family: inherit; }
        
        [data-theme="dark"] .brand-logo img { filter: invert(1); }

        /* --- 3. Global Effects --- */
        
        #scanlines {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, var(--bg-overlay-light), var(--bg-overlay-light) 1px, transparent 1px, transparent 3px);
            pointer-events: none; z-index: var(--z-scanlines);
        }

        #particles-js {
            position: fixed; inset: 0;
            z-index: var(--z-particles);
            pointer-events: none;
        }

        /* --- 4. Navigation (Header) --- */
        
        .nav-container {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 var(--space-lg);
            background: var(--color-bg);
            border-bottom: 1px solid var(--bg-overlay-light);
            z-index: var(--z-header);
        }

        .brand-logo img { display: block; width: var(--logo-width); height: auto; padding: var(--space-md) 0; }

        .nav-actions { display: flex; align-items: center; gap: var(--space-md); }
        
        .nav-action-btn { 
            font-family: var(--font-mono); font-weight: 700; font-size: 1.1rem; 
            text-transform: uppercase; padding: 0; transition: opacity 0.2s;
        }
        .nav-action-btn:hover { opacity: 0.6; }

        /* --- 5. Navigation (Drawer) --- */
        
        .menu-btn {
            position: relative; z-index: var(--z-button);
            width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
        }
        
        .menu-icon {
            position: relative; width: 30px; height: 2px;
            background: var(--color-text); transition: all 0.3s ease;
        }
        .menu-icon::before, .menu-icon::after {
            content: ''; position: absolute; left: 0;
            width: 30px; height: 2px; background: var(--color-text);
            transition: all 0.3s ease;
        }
        .menu-icon::before { top: -8px; }
        .menu-icon::after { top: 8px; }

        .menu-btn.is-active .menu-icon { background: transparent; }
        .menu-btn.is-active .menu-icon::before { top: 0; transform: rotate(45deg); }
        .menu-btn.is-active .menu-icon::after { top: 0; transform: rotate(-45deg); }

        .side-menu {
            position: fixed; 
            top: var(--nav-height);
            right: -100%;
            width: auto;
            min-width: 250px;
            height: calc(100vh - var(--nav-height));
            background: var(--color-bg);
            border-left: 1px solid var(--bg-overlay-light);
            border-top: 1px solid var(--bg-overlay-light);
            padding: var(--space-lg) var(--space-xl);
            display: flex; flex-direction: column;
            z-index: var(--z-menu);
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: -10px 10px 30px var(--shadow-strong);
        }
        .side-menu.is-open { right: 0; }

        .menu-links { display: flex; flex-direction: column; gap: var(--space-md); flex: 1; }

        .menu-link {
            font-family: var(--font-main); font-size: var(--fs-nav); font-weight: 900;
            text-transform: uppercase; letter-spacing: var(--ls-condensed);
            color: var(--color-text); opacity: 1;
            text-decoration: none;
        }
        .menu-link:hover, .menu-link.is-active { opacity: 1; }
        .menu-link.is-highlight { opacity: 1; color: var(--color-text); } 

        .menu-overlay {
            position: fixed; inset: 0;
            background: var(--bg-overlay-medium);
            z-index: var(--z-overlay);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .menu-overlay.is-active { opacity: 1; pointer-events: all; }

        .auth-hidden { display: none !important; }

        /* --- 6. Main Layout (CENTERING FIX) --- */

        main {
            /* Ocupa el espacio restante entre nav y footer */
            flex: 1; 
            width: 100%; 
            padding-top: var(--nav-height);
            /* Centrado absoluto */
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            position: relative; 
            z-index: var(--z-content);
        }

        .section {
            width: 100%; 
            max-width: var(--container-max);
            /* Asegura que el contenido interno también se centre */
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            padding: var(--space-lg) var(--space-md); 
            margin: 0 auto;
        }

        /* --- 7. UI Components: Buttons --- */

        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 200px; padding: var(--space-sm) var(--space-lg);
            font-family: var(--font-mono); font-size: var(--fs-btn); font-weight: 700;
            letter-spacing: var(--ls-base); text-transform: uppercase;
            background: var(--color-text); color: var(--color-contrast);
            border: var(--border-width) solid var(--color-text); 
            border-radius: var(--border-radius);
            transition: all 0.2s ease; margin-top: var(--space-lg);
        }
        .btn-primary:hover { background: var(--color-bg); color: var(--color-text); }

        /* --- 8. View: Verification Specifics --- */

        .verify-container {
            width: 100%; max-width: 600px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .verify-state {
            display: none; flex-direction: column; align-items: center; width: 100%;
            animation: fadeIn 0.5s ease-out;
        }
        .verify-state.is-active { display: flex; }

        .verify-icon {
            font-size: 5rem; margin-bottom: var(--space-lg);
        }

        .verify-title {
            font-weight: 900; font-size: var(--fs-title); line-height: 1.1;
            letter-spacing: var(--ls-condensed); text-transform: uppercase;
            margin-bottom: var(--space-md);
        }

        .verify-message {
            font-size: 1.2rem; opacity: 0.8; margin-bottom: var(--space-sm);
            line-height: 1.6; max-width: 500px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .verify-icon.is-loading { animation: spin 2s linear infinite; opacity: 0.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 9. Footer --- */
        
        .site-footer {
            position: relative; z-index: var(--z-content);
            padding: var(--space-lg) 0; text-align: center; font-size: var(--fs-small);
        }
        .footer-links a { 
            font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; 
            margin: 0 var(--space-sm); transition: opacity 0.2s;
        }
        .footer-links a:hover { opacity: 0.7; }
        .footer-copyright { opacity: 0.5; margin-top: var(--space-sm); }

        /* --- 10. Responsive --- */
        
        @media (max-width: 900px) {
            .verify-title { font-size: 2.2rem; }
            .section { padding-left: var(--space-md); padding-right: var(--space-md); }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div id="scanlines"></div>

    <nav class="nav-container">
        <a href="index.html" class="brand-logo">
            <img src="img/logo.png" alt="Kruder 1">
        </a>
        <div class="nav-actions">
            <button id="btn-theme" class="nav-action-btn"><i class="fa-solid fa-moon"></i></button>
            <button id="btn-lang" class="nav-action-btn">EN</button>
            <button class="menu-btn" id="menu-toggle" aria-label="Menu">
                <div class="menu-icon"></div>
            </button>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
        <nav class="menu-links">
            <a href="index.html" class="menu-link" data-i18n="m_home"></a>
            <a href="pricing.html" class="menu-link" data-i18n="m_pricing"></a>
            <a href="faqs.html" class="menu-link" data-i18n="m_faqs"></a>
            <a href="login.html" class="menu-link is-highlight" data-i18n="m_access" data-auth-guest></a>
            <a href="dashboard.html" class="menu-link auth-hidden" data-i18n="m_dash" data-auth-user></a>
            <a href="#" class="menu-link is-highlight auth-hidden" data-i18n="m_logout" data-auth-user id="link-logout"></a>
        </nav>
    </div>

    <main>
        <section class="section">
            <div class="verify-container">
                
                <div id="state-loading" class="verify-state is-active">
                    <div class="verify-icon is-loading"><i class="fa-solid fa-circle-notch"></i></div>
                    <h1 class="verify-title" data-i18n="v_load_title"></h1>
                    <p class="verify-message" data-i18n="v_load_msg"></p>
                </div>

                <div id="state-success" class="verify-state">
                    <div class="verify-icon"><i class="fa-regular fa-circle-check"></i></div>
                    <h1 class="verify-title" data-i18n="v_success_title"></h1>
                    <p class="verify-message" data-i18n="v_success_msg"></p>
                    <button type="button" class="btn-primary" data-i18n="v_btn_close" data-goto-login></button>
                </div>

                <div id="state-exists" class="verify-state">
                    <div class="verify-icon"><i class="fa-solid fa-check-double"></i></div>
                    <h1 class="verify-title" data-i18n="v_exists_title"></h1>
                    <p class="verify-message" data-i18n="v_exists_msg"></p>
                    <button type="button" class="btn-primary" data-i18n="v_btn_close" data-goto-login></button>
                </div>

                <div id="state-error" class="verify-state">
                    <div class="verify-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
                    <h1 class="verify-title" data-i18n="v_error_title"></h1>
                    <p class="verify-message" id="error-message-text" data-i18n="v_error_msg_def"></p>
                    <p class="verify-message" data-i18n="v_error_help"></p>
                    </div>

            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html" data-i18n="footer_privacy"></a>
            <span>·</span>
            <a href="terms.html" data-i18n="footer_terms"></a>
            <span>·</span>
            <a href="contact.html" data-i18n="footer_contact"></a>
        </div>
        <div class="footer-copyright">© 2026 Kruder 1. All rights reserved.</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            /* --- 1. Global Configuration & State --- */

            const CONFIG = {
                keyLang: 'KRUDER1-concept-lang',
                keyTheme: 'KRUDER1-concept-theme',
                keyToken: 'KRUDER1_token',
                apiBase: 'https://kruder1-auth.kruder1-master.workers.dev',
                particlesColor: { light: '#000000', dark: '#ffffff' }
            };

            const detectSystemLang = () => {
                const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
                return lang.startsWith('es') ? 'es' : 'en';
            };

            const STATE = {
                lang: localStorage.getItem(CONFIG.keyLang) || detectSystemLang(),
                theme: localStorage.getItem(CONFIG.keyTheme) || 'light'
            };

            const DOM = {
                root: document.documentElement,
                btnLang: document.getElementById('btn-lang'),
                btnTheme: document.getElementById('btn-theme'),
                btnMenu: document.getElementById('menu-toggle'),
                menuDrawer: document.getElementById('side-menu'),
                menuOverlay: document.getElementById('menu-overlay'),
                i18nElements: document.querySelectorAll('[data-i18n]'),
                states: {
                    loading: document.getElementById('state-loading'),
                    success: document.getElementById('state-success'),
                    exists: document.getElementById('state-exists'),
                    error: document.getElementById('state-error')
                },
                errorText: document.getElementById('error-message-text')
            };

            /* --- 2. Localization Dictionary (I18N) --- */
            
            const DICTIONARY = {
                // --- Navigation ---
                m_home: { en: 'Home', es: 'Inicio' },
                m_pricing: { en: 'Pricing', es: 'Precios' },
                m_faqs: { en: 'FAQ\'s', es: 'Preguntas' },
                m_access: { en: 'Login / Join', es: 'Entrar / Unirse' },
                m_dash: { en: 'Dashboard', es: 'Panel' },
                m_logout: { en: 'Logout', es: 'Salir' },

                // --- View: Verify ---
                v_load_title: { en: 'Verifying Email...', es: 'Verificando Email...' },
                v_load_msg: { en: 'Please wait while we verify your email address.', es: 'Por favor espera mientras verificamos tu dirección de email.' },
                
                v_success_title: { en: 'Email Verified Successfully!', es: '¡Email Verificado Exitosamente!' },
                v_success_msg: { 
                    en: 'Your email has been verified. Your account is now active. You can log in on the website or in the Kruder 1 software.', 
                    es: 'Tu email ha sido verificado. Tu cuenta está ahora activa. Puedes iniciar sesión en el sitio web o en el software Kruder 1.' 
                },
                
                v_exists_title: { en: 'Email Already Verified', es: 'Email Ya Verificado' },
                v_exists_msg: { 
                    en: 'Your email address has already been verified. You can log in on the website or in the Kruder 1 software anytime.', 
                    es: 'Tu dirección de email ya ha sido verificada. Puedes iniciar sesión en el sitio web o en el software Kruder 1 en cualquier momento.' 
                },

                v_error_title: { en: 'Verification Failed', es: 'Verificación Fallida' },
                v_error_msg_def: { 
                    en: 'Unable to verify your email. The verification link may be invalid or expired.', 
                    es: 'No se pudo verificar tu email. El enlace de verificación puede ser inválido o haber expirado.' 
                },
                v_error_help: { 
                    en: 'Please try registering again to receive a new verification email.', 
                    es: 'Por favor intenta registrarte nuevamente para recibir un nuevo email de verificación.' 
                },

                v_btn_close: { en: 'Go to Login', es: 'Ir a Iniciar sesión' },

                // --- Footer ---
                footer_privacy: { en: 'Privacy', es: 'Privacidad' },
                footer_terms: { en: 'Terms', es: 'Términos' },
                footer_contact: { en: 'Contact', es: 'Contacto' }
            };

            /* --- 3. Core Functions --- */

            const t = (key) => {
                const entry = DICTIONARY[key];
                return entry ? (entry[STATE.lang] || entry.en) : key;
            };

            const updateTexts = () => {
                DOM.i18nElements.forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (key) el.innerHTML = t(key);
                });
            };

            const setLang = (newLang) => {
                STATE.lang = newLang;
                localStorage.setItem(CONFIG.keyLang, newLang);
                DOM.root.lang = newLang;
                if (DOM.btnLang) DOM.btnLang.textContent = newLang.toUpperCase();
                updateTexts();
            };

            const setTheme = (newTheme) => {
                STATE.theme = newTheme;
                localStorage.setItem(CONFIG.keyTheme, newTheme);
                if (newTheme === 'dark') {
                    DOM.root.setAttribute('data-theme', 'dark');
                    if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>';
                } else {
                    DOM.root.removeAttribute('data-theme');
                    if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-moon"></i>';
                }
                initParticles();
            };

            const toggleMenu = () => {
                DOM.btnMenu.classList.toggle('is-active');
                DOM.menuDrawer.classList.toggle('is-open');
                DOM.menuOverlay.classList.toggle('is-active');
            };

            const updateAuthUI = () => {
                const token = localStorage.getItem(CONFIG.keyToken);
                const isLoggedIn = !!token;
                document.querySelectorAll('[data-auth-guest]').forEach(el => el.classList.toggle('auth-hidden', isLoggedIn));
                document.querySelectorAll('[data-auth-user]').forEach(el => el.classList.toggle('auth-hidden', !isLoggedIn));
            };

            const logout = () => {
                localStorage.removeItem(CONFIG.keyToken);
                window.location.href = 'login.html';
            };

            const initParticles = () => {
                if (!window.particlesJS) return;
                const color = STATE.theme === 'dark' ? CONFIG.particlesColor.dark : CONFIG.particlesColor.light;
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 200, density: { enable: true, value_area: 800 } },
                        color: { value: color },
                        shape: { type: 'circle' },
                        opacity: { value: 0.1, random: true },
                        size: { value: 2, random: true },
                        line_linked: { enable: true, distance: 150, color: color, opacity: 0.1, width: 1 },
                        move: { enable: true, speed: 2, direction: 'none', out_mode: 'out' }
                    },
                    interactivity: { detect_on: 'canvas', events: { onhover: { enable: false }, onclick: { enable: false } } },
                    retina_detect: true
                });
            };

            /* --- 4. Verification Logic --- */

            const showState = (stateName) => {
                Object.values(DOM.states).forEach(el => el.classList.remove('is-active'));
                if (DOM.states[stateName]) DOM.states[stateName].classList.add('is-active');
            };

            const verifyEmail = async () => {
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');

                if (!token) {
                    DOM.errorText.textContent = STATE.lang === 'en' 
                        ? 'No verification token found in the URL.' 
                        : 'No se encontró el token de verificación en la URL.';
                    showState('error');
                    return;
                }

                try {
                    const response = await fetch(CONFIG.apiBase + '/verify-email?token=' + encodeURIComponent(token));

                    const data = await response.json().catch(() => ({}));

                    if (response.ok) {
                        if (data.message && data.message.toLowerCase().includes('already verified')) {
                            showState('exists');
                        } else {
                            showState('success');
                        }
                    } else {
                        // Use default error message from I18N if API error is generic, otherwise show API error
                        const defMsg = STATE.lang === 'en' ? 'Unable to verify your email.' : 'No se pudo verificar tu email.';
                        DOM.errorText.textContent = data.error || defMsg;
                        showState('error');
                    }
                } catch (error) {
                    console.error('Verification error:', error);
                    DOM.errorText.textContent = STATE.lang === 'en' 
                        ? 'Unable to connect to the server. Please check your internet connection and try again.' 
                        : 'No se pudo conectar al servidor. Por favor verifica tu conexión a internet e intenta de nuevo.';
                    showState('error');
                }
            };

            /* --- 5. Initialization & Events --- */

            if (DOM.btnLang) DOM.btnLang.addEventListener('click', () => setLang(STATE.lang === 'en' ? 'es' : 'en'));
            if (DOM.btnTheme) DOM.btnTheme.addEventListener('click', () => setTheme(STATE.theme === 'light' ? 'dark' : 'light'));
            if (DOM.btnMenu) DOM.btnMenu.addEventListener('click', toggleMenu);
            if (DOM.menuOverlay) DOM.menuOverlay.addEventListener('click', toggleMenu);
            document.getElementById('link-logout')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
            document.addEventListener('click', (e) => {
                if (e.target.closest('[data-goto-login]')) {
                    e.preventDefault();
                    localStorage.removeItem(CONFIG.keyToken);
                    window.location.href = 'login.html';
                }
            });

            setLang(STATE.lang);
            setTheme(STATE.theme);
            updateAuthUI();
            
            // Start Verification
            verifyEmail();
        });
    </script>
</body>
</html>
