<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruder 1 - Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        :root {
            --z-negative: -1;
            --z-particles: 0;
            --z-content: 10;
            --z-overlay: 900;
            --z-menu: 1000;
            --z-header: 1200;
            --z-button: 1300;
            --z-modal: 2000;
            --z-scanlines: 9999;

            --font-main: 'Inter Tight', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --ls-base: 0.01em;
            --ls-condensed: -0.02em;
            --ls-wide: 0.05em;
            --fs-hero: clamp(2rem, 6vw, 2.8rem);
            --fs-title: 2.8rem;
            --fs-subtitle: 1.5rem;
            --fs-nav: 1.5rem;
            --fs-btn: 1.2rem;
            --fs-input: 1rem;
            --fs-body: 1rem;
            --fs-small: 0.8rem;

            --space-xs: 0.5rem;
            --space-sm: 1rem;
            --space-md: 1.5rem;
            --space-lg: 2rem;
            --space-xl: 4rem;
            --nav-height: 130px;
            --logo-width: 80px;
            --container-max: 900px;
            --auth-max: 400px;
            --border-width: 2px;
            --border-radius: 12px;

            --color-bg: #ffffff;
            --color-text: #000000;
            --color-accent: #000000;
            --color-contrast: #ffffff;
            --color-border: #000000;
            --color-muted: rgba(0, 0, 0, 0.5);
            --bg-overlay-light: rgba(0, 0, 0, 0.05);
            --bg-overlay-focus: rgba(0, 0, 0, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.4);
            --shadow-strong: rgba(0, 0, 0, 0.15);
        }

        [data-theme="dark"] {
            --color-bg: #000000;
            --color-text: #ffffff;
            --color-accent: #ffffff;
            --color-contrast: #000000;
            --color-border: #ffffff;
            --color-muted: rgba(255, 255, 255, 0.5);
            --bg-overlay-light: rgba(255, 255, 255, 0.05);
            --bg-overlay-focus: rgba(255, 255, 255, 0.06);
            --bg-overlay-medium: rgba(0, 0, 0, 0.8);
            --shadow-strong: rgba(0, 0, 0, 0.5);
            color-scheme: dark;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        *::-webkit-scrollbar { display: none; }
        html, body { height: 100%; width: 100%; }

        body {
            display: flex;
            flex-direction: column;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-main);
            font-size: var(--fs-body);
            line-height: 1.5;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        a { text-decoration: none !important; color: inherit; cursor: pointer; }
        button { border: none; background: transparent; cursor: pointer; color: inherit; font-family: inherit; }
        [data-theme="dark"] .brand-logo img { filter: invert(1); }

        #scanlines {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, var(--bg-overlay-light), var(--bg-overlay-light) 1px, transparent 1px, transparent 3px);
            pointer-events: none; z-index: var(--z-scanlines);
        }

        #particles-js {
            position: fixed; inset: 0;
            z-index: var(--z-particles);
            pointer-events: none;
        }

        .nav-container {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 var(--space-lg);
            background: var(--color-bg);
            border-bottom: 1px solid var(--bg-overlay-light);
            z-index: var(--z-header);
        }

        .brand-logo img { display: block; width: var(--logo-width); height: auto; padding: var(--space-md) 0; }

        .nav-actions { display: flex; align-items: center; gap: var(--space-md); }
        .nav-action-btn { font-family: var(--font-mono); font-weight: 700; font-size: 1.1rem; text-transform: uppercase; transition: opacity 0.2s; }
        .nav-action-btn:hover { opacity: 0.6; }

        .menu-btn { position: relative; z-index: var(--z-button); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .menu-icon { position: relative; width: 30px; height: 2px; background: var(--color-text); transition: all 0.3s ease; }
        .menu-icon::before, .menu-icon::after { content: ''; position: absolute; left: 0; width: 30px; height: 2px; background: var(--color-text); transition: all 0.3s ease; }
        .menu-icon::before { top: -8px; }
        .menu-icon::after { top: 8px; }

        .menu-btn.is-active .menu-icon { background: transparent; }
        .menu-btn.is-active .menu-icon::before { top: 0; transform: rotate(45deg); }
        .menu-btn.is-active .menu-icon::after { top: 0; transform: rotate(-45deg); }

        .side-menu {
            position: fixed; top: var(--nav-height); right: -100%;
            width: auto; min-width: 250px; height: calc(100vh - var(--nav-height));
            background: var(--color-bg);
            border-left: 1px solid var(--bg-overlay-light);
            border-top: 1px solid var(--bg-overlay-light);
            padding: var(--space-lg) var(--space-xl);
            display: flex; flex-direction: column; z-index: var(--z-menu);
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: -10px 10px 30px var(--shadow-strong);
        }
        .side-menu.is-open { right: 0; }

        .menu-links { display: flex; flex-direction: column; gap: var(--space-md); flex: 1; }
        .menu-link { font-family: var(--font-main); font-size: var(--fs-nav); font-weight: 900; text-transform: uppercase; letter-spacing: var(--ls-condensed); color: var(--color-text); }
        .menu-overlay { position: fixed; inset: 0; background: var(--bg-overlay-medium); z-index: var(--z-overlay); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .menu-overlay.is-active { opacity: 1; pointer-events: all; }

        .auth-hidden { display: none !important; }

        main {
            flex: 1; width: 100%; padding-top: var(--nav-height);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; z-index: var(--z-content);
        }

        .section {
            width: 100%; max-width: var(--container-max);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: var(--space-lg) var(--space-md); margin: 0 auto;
        }

        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 200px; padding: var(--space-sm) var(--space-lg);
            font-family: var(--font-mono); font-size: var(--fs-btn); font-weight: 700;
            letter-spacing: var(--ls-base); text-transform: uppercase;
            background: var(--color-text); color: var(--color-contrast);
            border: var(--border-width) solid var(--color-text);
            border-radius: var(--border-radius);
            transition: all 0.2s ease; margin-top: var(--space-md);
        }
        .btn-primary:hover { background: var(--color-bg); color: var(--color-text); }
        .btn-primary.is-full { display: flex; width: 100%; }
        .btn-primary.is-disabled { opacity: 0.5; pointer-events: none; }

        .reset-container {
            width: 100%; max-width: var(--auth-max);
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .reset-state { display: none; flex-direction: column; align-items: center; width: 100%; }
        .reset-state.is-active { display: flex; }

        .reset-title {
            font-weight: 900; font-size: var(--fs-title); line-height: 1.1;
            letter-spacing: var(--ls-condensed); text-transform: uppercase;
            margin-bottom: var(--space-md);
        }

        .reset-message {
            font-size: 1.2rem; opacity: 0.8; margin-bottom: var(--space-sm);
            line-height: 1.6; max-width: 500px;
        }

        .input-wrap { position: relative; width: 100%; margin-bottom: var(--space-sm); }

        .input-field {
            display: block; width: 100%; padding: var(--space-sm); padding-right: 3.5rem;
            font-family: var(--font-mono); font-size: var(--fs-input); font-weight: 500;
            background: transparent; color: var(--color-text);
            border: var(--border-width) solid var(--color-border);
            border-radius: var(--border-radius);
            outline: none; transition: background 0.2s ease;
        }
        .input-field:focus { background: var(--bg-overlay-focus); }

        .password-toggle {
            position: absolute; top: 0; right: 0; height: 100%; width: 3.5rem;
            display: flex; align-items: center; justify-content: center;
            opacity: 0.5; cursor: pointer; z-index: 20;
        }
        .password-toggle:hover { opacity: 1; }
        .password-toggle .fa-eye-slash { display: none; }
        .password-toggle.is-visible .fa-eye { display: none; }
        .password-toggle.is-visible .fa-eye-slash { display: block; }

        .site-footer {
            position: relative; z-index: var(--z-content);
            padding: var(--space-lg) 0; text-align: center; font-size: var(--fs-small);
        }
        .footer-links a { font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; margin: 0 var(--space-sm); transition: opacity 0.2s; }
        .footer-copyright { opacity: 0.5; margin-top: var(--space-sm); }

        @media (max-width: 900px) {
            .reset-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div id="scanlines"></div>

    <nav class="nav-container">
        <a href="index.html" class="brand-logo">
            <img src="img/logo.png" alt="Kruder 1">
        </a>
        <div class="nav-actions">
            <button id="btn-theme" class="nav-action-btn"><i class="fa-solid fa-moon"></i></button>
            <button id="btn-lang" class="nav-action-btn">EN</button>
            <button class="menu-btn" id="menu-toggle" aria-label="Menu">
                <div class="menu-icon"></div>
            </button>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="side-menu" id="side-menu">
        <nav class="menu-links">
            <a href="index.html" class="menu-link" data-i18n="m_home"></a>
            <a href="pricing.html" class="menu-link" data-i18n="m_pricing"></a>
            <a href="faqs.html" class="menu-link" data-i18n="m_faqs"></a>
            <a href="login.html" class="menu-link is-highlight" data-i18n="m_access" data-auth-guest></a>
            <a href="dashboard.html" class="menu-link auth-hidden" data-i18n="m_dash" data-auth-user></a>
            <a href="#" class="menu-link is-highlight auth-hidden" data-i18n="m_logout" data-auth-user id="link-logout"></a>
        </nav>
    </div>

    <main>
        <section class="section">
            <div class="reset-container">

                <div id="state-form" class="reset-state is-active">
                    <h1 class="reset-title" data-i18n="r_title"></h1>
                    <p class="reset-message" data-i18n="r_msg"></p>
                    <form id="reset-form" class="auth-form" style="width: 100%; margin-top: var(--space-md);">
                        <div class="input-wrap">
                            <input class="input-field" type="password" id="new-password" data-i18n-placeholder="auth_placeholder_password" autocomplete="new-password">
                            <button type="button" class="password-toggle" tabindex="-1">
                                <i class="fa-solid fa-eye"></i>
                                <i class="fa-solid fa-eye-slash"></i>
                            </button>
                        </div>
                        <div class="input-wrap">
                            <input class="input-field" type="password" id="confirm-password" data-i18n-placeholder="auth_placeholder_confirm" autocomplete="new-password">
                            <button type="button" class="password-toggle" tabindex="-1">
                                <i class="fa-solid fa-eye"></i>
                                <i class="fa-solid fa-eye-slash"></i>
                            </button>
                        </div>
                        <button type="submit" class="btn-primary is-full is-disabled" id="btn-submit" data-i18n="r_btn"></button>
                    </form>
                </div>

                <div id="state-success" class="reset-state">
                    <div style="font-size: 5rem; margin-bottom: var(--space-lg);"><i class="fa-regular fa-circle-check"></i></div>
                    <h1 class="reset-title" data-i18n="r_success_title"></h1>
                    <p class="reset-message" data-i18n="r_success_msg"></p>
                    <button type="button" class="btn-primary" data-i18n="r_btn_login" data-goto-login></button>
                </div>

                <div id="state-error" class="reset-state">
                    <div style="font-size: 5rem; margin-bottom: var(--space-lg);"><i class="fa-solid fa-circle-exclamation"></i></div>
                    <h1 class="reset-title" data-i18n="r_error_title"></h1>
                    <p class="reset-message" id="error-text"></p>
                    <button type="button" class="btn-primary" data-i18n="r_btn_login" data-goto-login></button>
                </div>

                <div id="state-no-token" class="reset-state">
                    <div style="font-size: 5rem; margin-bottom: var(--space-lg);"><i class="fa-solid fa-link-slash"></i></div>
                    <h1 class="reset-title" data-i18n="r_no_token_title"></h1>
                    <p class="reset-message" data-i18n="r_no_token_msg"></p>
                    <button type="button" class="btn-primary" data-i18n="r_btn_forgot" data-goto-login></button>
                </div>

            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html" data-i18n="footer_privacy"></a>
            <span>·</span>
            <a href="terms.html" data-i18n="footer_terms"></a>
            <span>·</span>
            <a href="contact.html" data-i18n="footer_contact"></a>
        </div>
        <div class="footer-copyright">© 2026 Kruder 1. All rights reserved.</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const CONFIG = {
                keyLang: 'KRUDER1-concept-lang',
                keyTheme: 'KRUDER1-concept-theme',
                keyToken: 'KRUDER1_token',
                apiBase: 'https://kruder1-auth.kruder1-master.workers.dev',
                particlesColor: { light: '#000000', dark: '#ffffff' }
            };

            const detectSystemLang = () => {
                const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
                return lang.startsWith('es') ? 'es' : 'en';
            };

            const STATE = {
                lang: localStorage.getItem(CONFIG.keyLang) || detectSystemLang(),
                theme: localStorage.getItem(CONFIG.keyTheme) || 'light',
                token: null
            };

            const DOM = {
                root: document.documentElement,
                btnLang: document.getElementById('btn-lang'),
                btnTheme: document.getElementById('btn-theme'),
                btnMenu: document.getElementById('menu-toggle'),
                menuDrawer: document.getElementById('side-menu'),
                menuOverlay: document.getElementById('menu-overlay'),
                i18nElements: document.querySelectorAll('[data-i18n]'),
                i18nPlaceholders: document.querySelectorAll('[data-i18n-placeholder]'),
                states: {
                    form: document.getElementById('state-form'),
                    success: document.getElementById('state-success'),
                    error: document.getElementById('state-error'),
                    noToken: document.getElementById('state-no-token')
                },
                form: document.getElementById('reset-form'),
                newPassword: document.getElementById('new-password'),
                confirmPassword: document.getElementById('confirm-password'),
                btnSubmit: document.getElementById('btn-submit'),
                errorText: document.getElementById('error-text')
            };

            const DICTIONARY = {
                m_home: { en: 'Home', es: 'Inicio' },
                m_pricing: { en: 'Pricing', es: 'Precios' },
                m_faqs: { en: 'FAQ\'s', es: 'Preguntas' },
                m_access: { en: 'Login / Join', es: 'Entrar / Unirse' },
                m_dash: { en: 'Dashboard', es: 'Panel' },
                m_logout: { en: 'Logout', es: 'Salir' },
                auth_placeholder_password: { en: 'NEW PASSWORD', es: 'NUEVA CONTRASEÑA' },
                auth_placeholder_confirm: { en: 'CONFIRM PASSWORD', es: 'CONFIRMAR CONTRASEÑA' },
                r_title: { en: 'Reset Password', es: 'Restablecer Contraseña' },
                r_msg: { en: 'Enter your new password below.', es: 'Ingresa tu nueva contraseña.' },
                r_btn: { en: 'Reset Password', es: 'Restablecer Contraseña' },
                r_success_title: { en: 'Password Updated', es: 'Contraseña Actualizada' },
                r_success_msg: { en: 'Your password has been changed. You can now log in.', es: 'Tu contraseña ha sido cambiada. Ahora puedes iniciar sesión.' },
                r_btn_login: { en: 'Go to Login', es: 'Ir a Iniciar Sesión' },
                r_error_title: { en: 'Reset Failed', es: 'Restablecimiento Fallido' },
                r_no_token_title: { en: 'Invalid Link', es: 'Enlace Inválido' },
                r_no_token_msg: { en: 'No reset token found. Please request a new password reset link from the login page.', es: 'No se encontró el token. Solicita un nuevo enlace desde la página de inicio de sesión.' },
                r_btn_forgot: { en: 'Request Reset Link', es: 'Solicitar Enlace' },
                footer_privacy: { en: 'Privacy', es: 'Privacidad' },
                footer_terms: { en: 'Terms', es: 'Términos' },
                footer_contact: { en: 'Contact', es: 'Contacto' }
            };

            const t = (key) => (DICTIONARY[key] ? (DICTIONARY[key][STATE.lang] || DICTIONARY[key].en) : key);

            const updateTexts = () => {
                DOM.i18nElements.forEach(el => {
                    const k = el.getAttribute('data-i18n');
                    if (k) el.innerHTML = t(k);
                });
                DOM.i18nPlaceholders.forEach(el => {
                    const k = el.getAttribute('data-i18n-placeholder');
                    if (k) el.placeholder = t(k);
                });
            };

            const setLang = (l) => { STATE.lang = l; localStorage.setItem(CONFIG.keyLang, l); DOM.root.lang = l; if (DOM.btnLang) DOM.btnLang.textContent = l.toUpperCase(); updateTexts(); };
            const setTheme = (th) => {
                STATE.theme = th; localStorage.setItem(CONFIG.keyTheme, th);
                if (th === 'dark') { DOM.root.setAttribute('data-theme', 'dark'); if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>'; }
                else { DOM.root.removeAttribute('data-theme'); if (DOM.btnTheme) DOM.btnTheme.innerHTML = '<i class="fa-solid fa-moon"></i>'; }
                initParticles();
            };
            const toggleMenu = () => { DOM.btnMenu.classList.toggle('is-active'); DOM.menuDrawer.classList.toggle('is-open'); DOM.menuOverlay.classList.toggle('is-active'); };

            const updateAuthUI = () => {
                const token = localStorage.getItem(CONFIG.keyToken);
                const isLoggedIn = !!token;
                document.querySelectorAll('[data-auth-guest]').forEach(el => el.classList.toggle('auth-hidden', isLoggedIn));
                document.querySelectorAll('[data-auth-user]').forEach(el => el.classList.toggle('auth-hidden', !isLoggedIn));
            };

            const logout = () => {
                localStorage.removeItem(CONFIG.keyToken);
                window.location.href = 'login.html';
            };

            const initParticles = () => {
                if (!window.particlesJS) return;
                const c = STATE.theme === 'dark' ? CONFIG.particlesColor.dark : CONFIG.particlesColor.light;
                particlesJS('particles-js', {
                    particles: { number: { value: 200, density: { enable: true, value_area: 800 } }, color: { value: c }, shape: { type: 'circle' }, opacity: { value: 0.1, random: true }, size: { value: 2, random: true }, line_linked: { enable: true, distance: 150, color: c, opacity: 0.1, width: 1 }, move: { enable: true, speed: 2, direction: 'none', out_mode: 'out' } },
                    interactivity: { detect_on: 'canvas', events: { onhover: { enable: false }, onclick: { enable: false } } },
                    retina_detect: true
                });
            };

            const showState = (name) => {
                Object.values(DOM.states).forEach(el => { if (el) el.classList.remove('is-active'); });
                if (DOM.states[name]) DOM.states[name].classList.add('is-active');
            };

            const validateForm = () => {
                const p1 = DOM.newPassword.value;
                const p2 = DOM.confirmPassword.value;
                DOM.btnSubmit.classList.toggle('is-disabled', !p1 || !p2 || p1 !== p2);
            };

            const doReset = async (e) => {
                e.preventDefault();
                if (!STATE.token || DOM.btnSubmit.classList.contains('is-disabled')) return;
                const p1 = DOM.newPassword.value;
                const p2 = DOM.confirmPassword.value;
                if (p1 !== p2) return;
                DOM.btnSubmit.disabled = true;
                try {
                    const res = await fetch(CONFIG.apiBase + '/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: STATE.token, newPassword: p1 })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.error || 'Reset failed');
                    showState('success');
                } catch (err) {
                    DOM.errorText.textContent = err.message || (STATE.lang === 'en' ? 'Invalid or expired token.' : 'Token inválido o expirado.');
                    showState('error');
                } finally {
                    DOM.btnSubmit.disabled = false;
                }
            };

            DOM.form.addEventListener('submit', doReset);
            DOM.newPassword.addEventListener('input', validateForm);
            DOM.confirmPassword.addEventListener('input', validateForm);

            document.querySelectorAll('.password-toggle').forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const input = toggle.parentElement.querySelector('input');
                    if (input) {
                        const isPass = input.type === 'password';
                        input.type = isPass ? 'text' : 'password';
                        toggle.classList.toggle('is-visible', isPass);
                    }
                });
            });

            DOM.btnLang.addEventListener('click', () => setLang(STATE.lang === 'en' ? 'es' : 'en'));
            DOM.btnTheme.addEventListener('click', () => setTheme(STATE.theme === 'light' ? 'dark' : 'light'));
            DOM.btnMenu.addEventListener('click', toggleMenu);
            DOM.menuOverlay.addEventListener('click', toggleMenu);
            document.getElementById('link-logout')?.addEventListener('click', (e) => { e.preventDefault(); logout(); });
            document.addEventListener('click', (e) => {
                if (e.target.closest('[data-goto-login]')) {
                    e.preventDefault();
                    localStorage.removeItem(CONFIG.keyToken);
                    window.location.href = 'login.html';
                }
            });

            updateAuthUI();

            const urlParams = new URLSearchParams(window.location.search);
            STATE.token = urlParams.get('token');

            if (!STATE.token) {
                showState('noToken');
            }

            setLang(STATE.lang);
            setTheme(STATE.theme);
        });
    </script>
</body>
</html>
