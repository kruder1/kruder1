<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruder 1 — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div id="ch-bottom"></div>

    <div class="top-urgency-bar">
        <span class="pulse-dot"></span> <span data-i18n="urgency_counter"></span>
    </div>

    <nav class="nav-main">
        <a href="index.html" class="brand-logo">
            <img src="img/logo.png" alt="Kruder 1">
        </a>
        <div class="nav-actions">
            <button id="btn-theme" class="nav-action-btn" aria-label="Toggle theme"><i class="fa-solid fa-moon"></i></button>
            <button id="btn-lang" class="nav-action-btn">EN</button>
            <a href="login.html" class="btn-accent btn-sm" id="btn-access" data-i18n="nav_access">CLIENT ACCESS</a>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="reset-container">

                <div id="state-form" class="reset-state is-active">
                    <h1 class="reset-title" data-i18n="r_title"></h1>
                    <p class="reset-message" data-i18n="r_msg"></p>
                    <form id="reset-form" class="auth-form" style="width: 100%; margin-top: var(--space-md);">
                        <div class="input-wrap">
                            <input class="input-field" type="password" id="new-password" data-i18n-placeholder="auth_placeholder_password" autocomplete="new-password">
                            <button type="button" class="password-toggle" tabindex="-1">
                                <i class="fa-solid fa-eye"></i>
                                <i class="fa-solid fa-eye-slash"></i>
                            </button>
                        </div>
                        <div class="input-wrap">
                            <input class="input-field" type="password" id="confirm-password" data-i18n-placeholder="auth_placeholder_confirm" autocomplete="new-password">
                            <button type="button" class="password-toggle" tabindex="-1">
                                <i class="fa-solid fa-eye"></i>
                                <i class="fa-solid fa-eye-slash"></i>
                            </button>
                        </div>
                        <button type="submit" class="btn-accent is-full is-disabled" id="btn-submit" data-i18n="r_btn"></button>
                    </form>
                </div>

                <div id="state-success" class="reset-state">
                    <div style="font-size: 5rem; margin-bottom: var(--space-lg);"><i class="fa-regular fa-circle-check"></i></div>
                    <h1 class="reset-title" data-i18n="r_success_title"></h1>
                    <p class="reset-message" data-i18n="r_success_msg"></p>
                    <button type="button" class="btn-accent" data-i18n="r_btn_login" data-goto-login></button>
                </div>

                <div id="state-error" class="reset-state">
                    <div style="font-size: 5rem; margin-bottom: var(--space-lg);"><i class="fa-solid fa-circle-exclamation"></i></div>
                    <h1 class="reset-title" data-i18n="r_error_title"></h1>
                    <p class="reset-message" id="error-text"></p>
                    <button type="button" class="btn-accent" data-i18n="r_btn_login" data-goto-login></button>
                </div>

                <div id="state-no-token" class="reset-state">
                    <div style="font-size: 5rem; margin-bottom: var(--space-lg);"><i class="fa-solid fa-link-slash"></i></div>
                    <h1 class="reset-title" data-i18n="r_no_token_title"></h1>
                    <p class="reset-message" data-i18n="r_no_token_msg"></p>
                    <button type="button" class="btn-accent" data-i18n="r_btn_forgot" data-goto-login></button>
                </div>

            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html" data-i18n="footer_privacy"></a>
            <span>·</span>
            <a href="terms.html" data-i18n="footer_terms"></a>
            <span>·</span>
            <a href="contact.html" data-i18n="footer_contact"></a>
            <span>·</span>
            <a href="status.html" data-i18n="footer_status"></a>
        </div>
        <div class="footer-copyright">© 2026 Kruder 1. All rights reserved.</div>
    </footer>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            KRUDER.init({
                nav_access: { en: 'CLIENT ACCESS', es: 'ACCESO CLIENTES' },
                nav_logout: { en: 'LOGOUT', es: 'CERRAR SESIÓN' },
                auth_placeholder_password: { en: 'NEW PASSWORD', es: 'NUEVA CONTRASEÑA' },
                auth_placeholder_confirm:  { en: 'CONFIRM PASSWORD', es: 'CONFIRMAR CONTRASEÑA' },
                r_title:         { en: 'Reset Password', es: 'Restablecer Contraseña' },
                r_msg:           { en: 'Enter your new password below.', es: 'Ingresa tu nueva contraseña.' },
                r_btn:           { en: 'Reset Password', es: 'Restablecer Contraseña' },
                r_success_title: { en: 'Password Updated', es: 'Contraseña Actualizada' },
                r_success_msg:   { en: 'Your password has been changed. You can now log in.', es: 'Tu contraseña ha sido cambiada. Ahora puedes iniciar sesión.' },
                r_btn_login:     { en: 'Go to Login', es: 'Ir a Iniciar Sesión' },
                r_error_title:   { en: 'Reset Failed', es: 'Restablecimiento Fallido' },
                r_no_token_title:{ en: 'Invalid Link', es: 'Enlace Inválido' },
                r_no_token_msg:  { en: 'No reset token found. Please request a new password reset link from the login page.', es: 'No se encontró el token. Solicita un nuevo enlace desde la página de inicio de sesión.' },
                r_btn_forgot:    { en: 'Request Reset Link', es: 'Solicitar Enlace' }
            });

            const states = {
                form:    document.getElementById('state-form'),
                success: document.getElementById('state-success'),
                error:   document.getElementById('state-error'),
                noToken: document.getElementById('state-no-token')
            };
            const form            = document.getElementById('reset-form');
            const newPassword     = document.getElementById('new-password');
            const confirmPassword = document.getElementById('confirm-password');
            const btnSubmit       = document.getElementById('btn-submit');
            const errorText       = document.getElementById('error-text');

            const urlParams = new URLSearchParams(window.location.search);
            const resetToken = urlParams.get('token');

            const showState = (name) => {
                Object.values(states).forEach(el => { if (el) el.classList.remove('is-active'); });
                if (states[name]) states[name].classList.add('is-active');
            };

            const isValidPassword = (s) => typeof s === 'string' && s.length >= 8 && /[a-z]/.test(s) && /[A-Z]/.test(s) && /\d/.test(s);
            const validateForm = () => {
                const p1 = newPassword.value;
                const p2 = confirmPassword.value;
                btnSubmit.classList.toggle('is-disabled', !p1 || !p2 || p1 !== p2 || !isValidPassword(p1));
            };

            const doReset = async (e) => {
                e.preventDefault();
                if (!resetToken || btnSubmit.classList.contains('is-disabled')) return;
                const p1 = newPassword.value;
                const p2 = confirmPassword.value;
                if (p1 !== p2) return;
                KRUDER.setBtnLoading(btnSubmit, true);
                try {
                    const res = await fetch(KRUDER.CONFIG.apiBase + '/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: resetToken, newPassword: p1 })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.error || 'Reset failed');
                    showState('success');
                } catch (err) {
                    errorText.textContent = err.message || (KRUDER.STATE.lang === 'en' ? 'Invalid or expired token.' : 'Token inválido o expirado.');
                    showState('error');
                } finally {
                    KRUDER.setBtnLoading(btnSubmit, false);
                }
            };

            form.addEventListener('submit', doReset);
            newPassword.addEventListener('input', validateForm);
            confirmPassword.addEventListener('input', validateForm);

            document.querySelectorAll('.password-toggle').forEach(toggle => {
                toggle.addEventListener('click', () => {
                    const input = toggle.parentElement.querySelector('input');
                    if (input) {
                        const isPass = input.type === 'password';
                        input.type = isPass ? 'text' : 'password';
                        toggle.classList.toggle('is-visible', isPass);
                    }
                });
            });

            document.addEventListener('click', (e) => {
                if (e.target.closest('[data-goto-login]')) {
                    e.preventDefault();
                    localStorage.removeItem(KRUDER.CONFIG.keyToken);
                    window.location.href = 'login.html';
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const k = el.getAttribute('data-i18n-placeholder');
                if (k) el.placeholder = KRUDER.t(k);
            });

            if (!resetToken) {
                showState('noToken');
            }
        });
    </script>
</body>
</html>
