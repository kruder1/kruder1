<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kruder 1 — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div id="ch-bottom"></div>

    <div class="top-urgency-bar">
        <span class="pulse-dot"></span> <span data-i18n="urgency_counter"></span>
    </div>

    <nav class="nav-main">
        <a href="index.html" class="brand-logo">
            <img src="img/logo.png" alt="Kruder 1">
        </a>
        <div class="nav-actions">
            <button id="btn-theme" class="nav-action-btn" aria-label="Toggle theme"><i class="fa-solid fa-moon"></i></button>
            <button id="btn-lang" class="nav-action-btn">EN</button>
            <a href="login.html" class="btn-accent btn-sm" id="btn-access" data-i18n="nav_access">CLIENT ACCESS</a>
        </div>
    </nav>

    <main>
        <section class="section">
            <div class="dash-container">
                <h1 class="dash-welcome" data-i18n="d_welcome"></h1>
                <div class="user-badge" id="user-email">—</div>

                <div class="credits-display">
                    <div class="credits-number" id="credits-number">0</div>
                    <div class="credits-label" data-i18n="d_credits_label"></div>
                </div>

                <div class="dash-buttons">
                    <button type="button" id="btn-download" class="btn-accent" data-i18n="d_btn_download"></button>
                    <a href="index.html#pricing" class="btn-secondary" data-i18n="d_btn_buy"></a>
                    <a href="manual.html" class="btn-secondary" data-i18n="d_btn_manual"></a>
                </div>

                <div class="history-section">
                    <div class="history-title" data-i18n="d_history_title"></div>
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th data-i18n="d_th_date"></th>
                                <th data-i18n="d_th_credits"></th>
                                <th data-i18n="d_th_total"></th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <tr><td colspan="3" data-i18n="d_no_purchases"></td></tr>
                        </tbody>
                    </table>
                </div>

                <a href="#" id="btn-logout" class="btn-secondary" data-i18n="d_btn_logout" style="margin-top: var(--space-lg);"></a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html" data-i18n="footer_privacy"></a>
            <span>·</span>
            <a href="terms.html" data-i18n="footer_terms"></a>
            <span>·</span>
            <a href="contact.html" data-i18n="footer_contact"></a>
            <span>·</span>
            <a href="status.html" data-i18n="footer_status"></a>
        </div>
        <div class="footer-copyright">© 2026 Kruder 1. All rights reserved.</div>
    </footer>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            KRUDER.init({
				nav_access: { en: 'CLIENT ACCESS', es: 'ACCESO CLIENTES' },
				nav_logout: { en: 'LOGOUT', es: 'CERRAR SESIÓN' },
				d_welcome: { en: 'Welcome', es: 'Bienvenido' },
                d_credits_label: { en: 'Credits Remaining', es: 'Créditos Restantes' },
                d_btn_download: { en: 'Download Software', es: 'Descargar Software' },
                d_btn_buy: { en: 'Buy More Credits', es: 'Comprar Créditos' },
                d_btn_manual: { en: 'User Manual', es: 'Manual de Usuario' },
                d_history_title: { en: 'Purchase History', es: 'Historial de Compras' },
                d_th_date: { en: 'Date', es: 'Fecha' },
                d_th_credits: { en: 'Credits', es: 'Créditos' },
                d_th_total: { en: 'Total', es: 'Total' },
                d_no_purchases: { en: 'No purchases yet', es: 'Aún no hay compras' },
                d_btn_logout: { en: 'Logout', es: 'Cerrar Sesión' }
            });

            const DOM = {
                userEmail: document.getElementById('user-email'),
                creditsNumber: document.getElementById('credits-number'),
                btnDownload: document.getElementById('btn-download'),
                btnLogout: document.getElementById('btn-logout')
            };

            const checkAuth = () => {
                if (!localStorage.getItem(KRUDER.CONFIG.keyToken)) { window.location.href = 'login.html'; return false; }
                return true;
            };

            const loadUserData = async () => {
                const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                if (!token) return;
                try {
                    const res = await fetch(KRUDER.CONFIG.apiBase + '/me', { headers: { 'Authorization': 'Bearer ' + token } });
                    if (res.status === 401 || res.status === 403 || res.status === 404) { localStorage.removeItem(KRUDER.CONFIG.keyToken); window.location.href = 'login.html'; return; }
                    if (!res.ok) throw new Error('Failed to load user');
                    const data = await res.json();
                    if (DOM.userEmail) DOM.userEmail.textContent = data.email || '—';
                    if (DOM.creditsNumber) DOM.creditsNumber.textContent = String(data.credits ?? 0);
                    loadPurchases();
                } catch (e) { console.error(e); localStorage.removeItem(KRUDER.CONFIG.keyToken); window.location.href = 'login.html'; }
            };

            const loadPurchases = async () => {
                const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                const tbody = document.getElementById('history-body');
                if (!token || !tbody) return;
                try {
                    const res = await fetch(KRUDER.CONFIG.apiBase + '/purchases', { headers: { 'Authorization': 'Bearer ' + token } });
                    if (!res.ok) return;
                    const { purchases } = await res.json();
                    if (!purchases?.length) { tbody.innerHTML = '<tr><td colspan="3" data-i18n="d_no_purchases"></td></tr>'; KRUDER.updateTexts(); return; }
                    const creditsToUsd = { 150: '$40.00 USD', 300: '$60.00 USD', 600: '$90.00 USD' };
                    tbody.innerHTML = purchases.map(p => {
                        const d = new Date(p.created_at);
                        const dateStr = d.toLocaleDateString(KRUDER.STATE.lang === 'es' ? 'es-ES' : 'en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                        return `<tr><td>${dateStr}</td><td>${p.credits_added}</td><td>${creditsToUsd[p.credits_added] || '—'}</td></tr>`;
                    }).join('');
                } catch (e) { console.error(e); }
            };

            const downloadSoftware = async () => {
                const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                if (!token) return;
                KRUDER.setBtnLoading(DOM.btnDownload, true);
                try {
                    const res = await fetch('https://kruder1-gen.kruder1-master.workers.dev/check-software-update', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (!res.ok) throw new Error('Failed to get download info');
                    const data = await res.json();
                    if (data.ok && data.url) {
                        const a = document.createElement('a');
                        a.href = data.url;
                        a.download = '';
                        a.click();
                    } else {
                        throw new Error('No download available');
                    }
                } catch (e) {
                    console.error(e);
                    alert(KRUDER.STATE.lang === 'es' ? 'No se pudo descargar. Intenta de nuevo.' : 'Download failed. Please try again.');
                } finally {
                    KRUDER.setBtnLoading(DOM.btnDownload, false);
                }
            };

            if (DOM.btnDownload) DOM.btnDownload.addEventListener('click', downloadSoftware);
            if (DOM.btnLogout) DOM.btnLogout.addEventListener('click', (e) => { e.preventDefault(); KRUDER.logout(); });

            if (checkAuth()) {
                loadUserData();
                const params = new URLSearchParams(window.location.search);
                if (params.get('success') === '1') history.replaceState(null, '', window.location.pathname);
            }
        });
    </script>
</body>
</html>
