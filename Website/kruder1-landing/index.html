                a5: { en: 'Yes. Credits are tied to your account, not your machine. Use them on any Windows PC.', es: 'Sí. Los créditos están ligados a tu cuenta, no a tu máquina. Úsalos en cualquier PC con Windows.' },
                q6: { en: 'What happens if I run out of credits?', es: '¿Qué pasa si me quedo sin créditos?' },
                a6: { en: 'If your balance hits zero and you don\'t recharge within 30 days, your account is deactivated and your spot is given to the next operator on the waitlist.', es: 'Si tu saldo llega a cero y pasan 30 días sin recargar, tu cuenta se desactiva y le damos tu lugar al siguiente operador en la lista de espera.' },

                /* ── Contact ── */
                c_title:    { en: 'Get in touch.', es: 'Contáctanos.' },
                c_location: { en: 'Based in Mexico. Available worldwide.', es: 'Desde México. Disponibles en todo el mundo.' },

                /* ── Footer ── */
                footer_privacy: { en: 'Privacy Policy', es: 'Aviso de Privacidad' },
                footer_terms:   { en: 'Terms & Conditions', es: 'Términos y Condiciones' },
                footer_contact: { en: 'Contact', es: 'Contacto' },
                footer_status:  { en: 'System Status', es: 'Estado del Sistema' }
            });

            /* ── Gain Calculator Logic ── */
            const calcHours = document.getElementById('calc-hours');
            const calcFee = document.getElementById('calc-fee');
            const calcUpsell = document.getElementById('calc-upsell');
            const outTicket = document.getElementById('out-ticket');
            const outPkg = document.getElementById('out-pkg');

            function updateCalculator() {
                if(!calcHours || !calcFee || !calcUpsell) return;
                const hours = parseInt(calcHours.value);
                const fee = parseFloat(calcFee.value) || 0;
                const upsell = parseFloat(calcUpsell.value);

                if (fee === 0 || isNaN(fee)) {
                    outTicket.innerText = '$0';
                } else {
                    const totalTicket = fee + (fee * upsell);
                    outTicket.innerText = '$' + totalTicket.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
                }

                const photosNeeded = hours * 60;
                let pkgSuggested = '';
                if (photosNeeded <= 150) pkgSuggested = 'Basic (150)';
                else if (photosNeeded <= 300) pkgSuggested = 'Plus (300)';
                else pkgSuggested = 'Pro (600)';
                outPkg.innerText = pkgSuggested;
            }

            if(calcHours && calcFee && calcUpsell) {
                calcHours.addEventListener('change', updateCalculator);
                calcFee.addEventListener('input', updateCalculator);
                calcUpsell.addEventListener('change', updateCalculator);
                updateCalculator(); 
            }

            /* ── Stripe Checkout ── */
            const fetchPricing = async () => {
                try {
                    const res = await fetch('https://kruder1.com/api/pricing');
                    if (!res.ok) throw new Error('API Error');
                    const data = await res.json();

                    KRUDER.STATE.dict.p_basic_price = { en: data.basic.price_en, es: data.basic.price_es };
                    KRUDER.STATE.dict.p_plus_price  = { en: data.plus.price_en,  es: data.plus.price_es };
                    KRUDER.STATE.dict.p_pro_price   = { en: data.pro.price_en,   es: data.pro.price_es };
                    KRUDER.updateTexts();

                    document.getElementById('btn-buy-basic').dataset.priceId = data.basic.id;
                    document.getElementById('btn-buy-plus').dataset.priceId  = data.plus.id;
                    document.getElementById('btn-buy-pro').dataset.priceId   = data.pro.id;
                } catch (e) {
                    console.error('Pricing fetch failed:', e);
                }
            };
            fetchPricing();

            const startCheckout = async (priceId) => {
                const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                if (!token) { window.location.href = 'login.html#create'; return; }
                const btn = document.querySelector(`.btn-buy[data-price-id="${priceId}"]`);
                KRUDER.setBtnLoading(btn, true);
                try {
                    const res = await fetch(`${KRUDER.CONFIG.apiBase}/create-checkout-session`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ priceId, lang: KRUDER.STATE.lang })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Error');
                    if (data.url) window.location.href = data.url;
                    else throw new Error('No checkout URL');
                } catch (e) {
                    KRUDER.setBtnLoading(btn, false);
                    alert(e.message || 'Could not start checkout');
                }
            };

            document.querySelectorAll('.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => {
                    const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                    const priceId = btn.dataset.priceId;
                    if (!token) { window.location.href = 'login.html#create'; return; }
                    if (priceId) startCheckout(priceId);
                });
            });

            /* ── FAQ Accordion ── */
            document.querySelectorAll('.faq-question').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const item = e.currentTarget.parentElement;
                    const isActive = item.classList.contains('is-active');
                    document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('is-active'));
                    if (!isActive) item.classList.add('is-active');
                });
            });
        });
    </script>
</body>
</html>
