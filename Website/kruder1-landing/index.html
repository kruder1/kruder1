    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            KRUDER.init({
                /* ── Hero ── */
                hero_title:    { en: 'The photo booth evolved.', es: 'La cabina de fotos evolucionó.' },
                hero_subtitle: { en: 'Has yours?', es: '¿Y la tuya?' },
                hero_desc:     { en: 'AI photo booth software. Ridiculously easy to use. Ridiculously easy to stand out with. Your clients pay for the experience — make sure it\'s worth remembering.', es: 'Software de cabina de fotos con IA. Ridículamente fácil de usar. Ridículamente fácil de destacar. Tus clientes pagan por la experiencia — asegúrate de que valga la pena recordarla.' },
                hero_cta:      { en: 'SEE PRICING', es: 'VER PRECIOS' },

                /* ── Pricing ── */
                pricing_title:    { en: 'One credit. One image.<br>No fine print.', es: 'Un crédito. Una imagen.<br>Sin letra chiquita.' },
                pricing_subtitle: { en: 'No subscriptions. No expiration. Buy once, use whenever.', es: 'Sin suscripciones. Sin expiración. Compra una vez, usa cuando quieras.' },
                pricing_features: { en: 'Free software. Free download. You only pay for credits.', es: 'Software gratis. Descarga gratis. Solo pagas por créditos.' },
                p_basic_title:    { en: 'Basic', es: 'Basic' },
                p_plus_title:     { en: 'Plus', es: 'Plus' },
                p_pro_title:      { en: 'Pro', es: 'Pro' },
                p_popular:        { en: 'Most Popular', es: 'Más Popular' },
                p_credits_label:  { en: 'credits', es: 'créditos' },
                btn_buy:          { en: 'Buy', es: 'Comprar' },
                btn_start:        { en: 'Get Started', es: 'Comenzar' },

                /* ── FAQs ── */
                faq_title: { en: 'Questions? Good.', es: '¿Preguntas? Bien.' },

                q1: { en: 'Do credits expire?', es: '¿Los créditos expiran?' },
                a1: { en: 'No, never. Buy credits once and use them whenever you want. No expiration dates. No rush.', es: 'No, nunca. Compra créditos una vez y úsalos cuando quieras. Sin fecha de vencimiento. Sin prisa.' },

                q2: { en: 'How many credits per image?', es: '¿Cuántos créditos por imagen?' },
                a2: { en: 'One credit, one AI-generated image. That simple.', es: 'Un crédito, una imagen generada con IA. Así de simple.' },

                q3: { en: 'Is there a monthly subscription?', es: '¿Hay suscripción mensual?' },
                a3: { en: 'No. Pay once, use anytime. No monthly fees, no hidden costs, no surprises.', es: 'No. Paga una vez, usa cuando quieras. Sin cuotas mensuales, sin costos ocultos, sin sorpresas.' },

                q4: { en: 'What equipment do I need?', es: '¿Qué equipo necesito?' },
                a4: { en: 'A Windows PC and a webcam. That\'s it. No special lighting or extra hardware needed.', es: 'Una PC con Windows y una webcam. Eso es todo. Sin iluminación especial ni equipo adicional.' },

                q5: { en: 'Can I use this on multiple computers?', es: '¿Puedo usarlo en varias computadoras?' },
                a5: { en: 'Yes. Credits are tied to your account, not your machine. Use them on any Windows PC.', es: 'Sí. Los créditos están ligados a tu cuenta, no a tu máquina. Úsalos en cualquier PC con Windows.' },

                q6: { en: 'What happens if I run out of credits?', es: '¿Qué pasa si me quedo sin créditos?' },
                a6: { en: 'Buy more anytime. Credits don\'t expire, so stock up whenever it makes sense for you.', es: 'Compra más cuando quieras. Los créditos no expiran, así que abastécete cuando te convenga.' },

                /* ── Contact ── */
                c_title:    { en: 'Get in touch.', es: 'Contáctanos.' },
                c_location: { en: 'Based in Mexico. Available worldwide.', es: 'Desde México. Disponibles en todo el mundo.' }
            });

            /* ── Stripe Checkout ── */

            const startCheckout = async (priceId) => {
                const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                if (!token) { window.location.href = 'login.html'; return; }
                const btn = document.querySelector(`.btn-buy[data-price-id="${priceId}"]`);
                KRUDER.setBtnLoading(btn, true);
                try {
                    const res = await fetch(`${KRUDER.CONFIG.apiBase}/create-checkout-session`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ priceId, lang: KRUDER.STATE.lang })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Error');
                    if (data.url) window.location.href = data.url;
                    else throw new Error('No checkout URL');
                } catch (e) {
                    KRUDER.setBtnLoading(btn, false);
                    alert(e.message || 'Could not start checkout');
                }
            };

            document.querySelectorAll('.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => {
                    const token = localStorage.getItem(KRUDER.CONFIG.keyToken);
                    const priceId = btn.dataset.priceId;
                    if (!token) { window.location.href = 'login.html'; return; }
                    if (priceId) startCheckout(priceId);
                });
            });

            /* ── FAQ Accordion ── */

            document.querySelectorAll('.faq-question').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const item = e.currentTarget.parentElement;
                    const isActive = item.classList.contains('is-active');
                    document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('is-active'));
                    if (!isActive) item.classList.add('is-active');
                });
            });
        });
    </script>
</body>
</html>
